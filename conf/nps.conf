#############################################
# Basic Settings
# 基本设置
#############################################
appname=nps
# Boot mode (dev|pro)
runmode=pro
# Secure mode 安全模式（启用后更安全，但不再兼容旧版客户端）
secure_mode=true
# DNS 服务器 / DNS server
dns_server=8.8.8.8
# 时区 / Timezone
#timezone=Asia/Shanghai
# NTP 服务器 / NTP server
#ntp_server=pool.ntp.org
#ntp_interval=5

#############################################
# Domain Proxy Settings
# 域名代理设置
#############################################
# HTTP/HTTPS 代理设置 / HTTP/HTTPS proxy settings（端口为 0 时不启动 / set port to 0 to disable）
http_proxy_ip=0.0.0.0
http_proxy_port=80
https_proxy_port=443
#http3_proxy_port=443

# HTTPS 默认证书 / Default HTTPS certificate
https_default_cert_file=conf/server.pem
https_default_key_file=conf/server.key
# 强制自动申请证书 / Force automatic SSL issuing（需确保通过 80/443 申请）
force_auto_ssl=false
# 自动申请证书保存目录 / Auto-issued cert storage path
ssl_path=conf/ssl
# 自动申请证书邮箱 / Email for ACME certificate issuing
ssl_email=you@yours.com
# 自动申请证书 CA / ACME CA provider（LetsEncrypt|ZeroSSL|GoogleTrust）
ssl_ca=LetsEncrypt
# ZeroSSL API Key（使用 ZeroSSL 时必填 / required for ZeroSSL）
#ssl_zerossl_api=xxx
# 证书缓存上限 / Max cert cache entries（0 为不限制 / 0 = unlimited）
ssl_cache_max=0
# 证书缓存重载间隔 / Cert cache reload interval（秒 / seconds）
ssl_cache_reload=3600
# 证书缓存闲置清理 / Idle cert cache cleanup（分钟 / minutes）
ssl_cache_idle=60

# 获取客户端真实 IP / Pass client real IP
http_add_origin_header=true
# 当使用 Nginx 等反向代理时，用 X-NPS-Http-Only + 密码避免 301 / Avoid 301 behind reverse proxy via X-NPS-Http-Only + password（留空关闭 / empty to disable）
#x_nps_http_only=password
x_nps_http_only=

# 后端响应头超时 / Backend response header timeout（秒 / seconds）
http_proxy_response_timeout=100

#############################################
# Client Connection Settings
# 客户端连接配置
#############################################
bridge_ip=0.0.0.0
# Bridge 监听端口 / Bridge listen ports（0 表示关闭 / 0 = disable）
bridge_tcp_port=8024
bridge_kcp_port=8024
bridge_tls_port=8025
bridge_quic_port=8025
bridge_ws_port=8026
bridge_wss_port=8027
# WS 连接路径 / WebSocket path
bridge_path=/ws
# WS 获取真实 IP / Real IP settings for WS
#bridge_real_ip_header=X-Real-IP
#bridge_trusted_ips=0.0.0.0/0,::/0
# 端口复用主机名 / Host for port reuse
bridge_host=xxx.com
# 允许通过 HTTP/3 端口连接 / Allow bridge over HTTP/3 port
#bridge_http3=true
# 证书文件（留空自动生成） / Cert files (leave empty to auto-generate)
#bridge_cert_file=
#bridge_key_file=
# 相同 vkey 客户端连接选取策略 / Client selection strategy for same vkey
# 0/Primary/p (主备) | 1/RoundRobin/rr (轮询) | 2/Random/rand (随机)
bridge_select_mode=Primary
# 网页命令行显示地址 / Address shown in Web terminal（留空跟随网页地址 / empty = use web host）
bridge_addr=

# 公共密钥 / Public vkey
public_vkey=

# P2P 配置 / P2P settings
# '0.0.0.0' 自动识别 IPv4，'::' 自动识别 IPv6 / use '0.0.0.0' for auto IPv4, '::' for auto IPv6
p2p_ip=0.0.0.0
p2p_port=6000
# Optional advanced P2P settings (leave commented to use defaults)
#p2p_probe_extra_reply=true
#p2p_stun_servers=stun.miwifi.com:3478,stun.chat.bilibili.com:3478
#p2p_probe_timeout_ms=5000
#p2p_handshake_timeout_ms=20000
#p2p_transport_timeout_ms=10000
#p2p_force_predict_on_restricted=true
#p2p_default_prediction_interval=1
#p2p_enable_target_spray=true
#p2p_enable_birthday_attack=false
#p2p_target_spray_span=64
#p2p_target_spray_rounds=2
#p2p_target_spray_burst=8
#p2p_target_spray_packet_sleep_ms=3
#p2p_target_spray_burst_gap_ms=10
#p2p_target_spray_phase_gap_ms=40
#p2p_birthday_listen_ports=8
#p2p_birthday_targets_per_port=16
#p2p_enable_upnp_portmap=false
#p2p_enable_pcp_portmap=false
#p2p_enable_natpmp_portmap=false
#p2p_portmap_lease_seconds=3600

# 客户端断开连接超时 / Client disconnect timeout（秒 / seconds）
disconnect_timeout=30

#############################################
# Allowed Port Range (Optional)
# 允许端口范围配置（可选）
#############################################
# 设置允许端口范围 / Allowed tunnel port ranges（格式：范围或单端口，逗号分隔 / ranges or single ports, comma-separated）
# 如需限制端口请取消注释 / Uncomment to enforce restrictions
#allow_ports=9001-9009,10001,11000-12000

#############################################
# Web Management Settings
# Web 管理配置
#############################################
# 管理后台账号 / Admin dashboard credentials
web_username=admin
web_password=123
# 2FA 双因素认证密钥 / TOTP secret
# 启用后登录时需在密码（或验证码）后追加 6 位动态码 / When enabled, append 6-digit OTP after password (or CAPTCHA) during login；"web_password" 留空可仅用 TOTP / leave "web_password" empty for TOTP-only login
# 可用 "nps -gen2fa" 生成密钥 / Use "nps -gen2fa" to generate secret；"-gen2fa=secret" 获取当前动态码 / get current OTP
totp_secret=
# 开启管理面板验证码 / Enable CAPTCHA on admin login
open_captcha=true
# PoW 计算位数 / PoW difficulty bits
pow_bits=20

# 是否允许 X-Real-IP 头 / Allow X-Real-IP header
allow_x_real_ip=false
# 受信任代理 IP / Trusted proxy IPs（逗号分隔 / comma-separated）
trusted_proxy_ips=127.0.0.1

# Web 管理监听 / Web admin bind settings
web_host=a.o.com
web_ip=0.0.0.0
web_port=8081
# 是否启用 HTTPS / Enable HTTPS
web_open_ssl=false
# HTTPS 证书文件 / HTTPS cert files
web_cert_file=conf/server.pem
web_key_file=conf/server.key
# 访问未知 Web 路径时是否直接断开连接（仅尽力而为，支持 Hijack 的 HTTP/1.x 连接可无响应断开）
# Close unknown Web paths without any HTTP response when possible (best-effort, works on hijackable HTTP/1.x connections)
#web_close_on_not_found=false
# 请求路径前缀 / Base URL path（例如 /nps -> http://host/nps）
#web_base_url=/nps

# 登录限频配置 / Login rate-limit settings
# 两次登录最小间隔 / Min interval between login requests（秒 / seconds，默认 default: 5）
#login_ban_time=5
# IP 维度失败重置周期 / Failure reset window by IP（秒 / seconds，默认 default: 180）
#login_ip_ban_time=180
# 用户名维度失败重置周期 / Failure reset window by username（秒 / seconds，默认 default: 3600）
#login_user_ban_time=3600
# 最大失败次数 / Max allowed login failures（默认 default: 10）
#login_max_fail_times=10
# 登录请求体最大大小 / Max login request body size（字节 / bytes，默认 default: 1024）
#login_max_body=1024
# 时间戳偏移容忍度 / Allowed timestamp skew（毫秒 / ms，默认 default: 300000 = 5 分钟）
#login_max_skew=300000

# Web 管理多用户设置 / Multi-user management settings
allow_user_login=false
#allow_user_vkey_login=false
allow_user_register=false
allow_user_change_username=false

#############################################
# Web API Security
# Web API 安全配置
#############################################
# API 认证密钥 / API authentication key（留空禁用 / empty to disable）
auth_key=
# 获取服务端 authKey 的 AES 密钥 / AES key for authKey API（16 位，留空禁用 / 16 chars, empty to disable）
auth_crypt_key=

#############################################
# Extended Features
# 扩展功能配置
#############################################
# 流量持久化间隔 / Traffic persistence interval（分钟 / minutes，留空不持久化 / empty disables persistence）
# 使用限制功能前需开启 / Required for limit features
flow_store_interval=1
# 流量限制 / Traffic quota limit
allow_flow_limit=true
# 带宽限制 / Bandwidth limit
allow_rate_limit=true
# 时间限制 / Time limit
allow_time_limit=true
# 客户端隧道数限制 / Max tunnels per client
allow_tunnel_num_limit=true
# 允许服务端本地代理 / Allow local proxy on server
allow_local_proxy=true
# 允许用户使用本地代理 / Allow user-side local proxy
allow_user_local=false
# 允许私密代理连任意地址 / Allow secret link to any target
allow_secret_link=false
# 允许私密代理连到服务端本地 / Allow secret link to server localhost
allow_secret_local=false
# 客户端最大连接数限制 / Max connections per client
allow_connection_num_limit=true
# 允许配置隧道监听 IP / Allow custom tunnel bind IP
allow_multi_ip=true
# 系统负载监控显示 / Show system load info
system_info_display=true
# IP 访问限制 / IP access restriction（详见文档；不清楚作用请勿开启 / see docs; leave disabled if unsure）
#ip_limit=true

#############################################
# Logging
# 日志配置
#############################################
# 日志模式 / Log mode: stdout|file|both|off
log=stdout
# 日志级别 / Log level: trace|debug|info|warn|error|fatal|panic|off
log_level=trace
# 日志输出路径 / Log output path
log_path=conf/nps.log
# 是否启用日志压缩 / Enable log compression (true|false)
log_compress=false
# 日志文件数量上限 / Max number of log files
log_max_files=10
# 日志保留天数 / Max days to keep logs
log_max_days=7
# 单日志最大大小 / Max size per log file（MB，超过自动轮换 / rotate when exceeded）
log_max_size=2

#############################################
# Debug Options
# 调试配置
#############################################
# pprof 调试选项 / pprof debug options（取消注释启用 / uncomment to enable）
#pprof_ip=0.0.0.0
#pprof_port=9999
