<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title langtag="title-login"></title>
    <!-- Mainly scripts -->
    <!-- Latest compiled and minified CSS -->
    <link href="{{.web_base_url}}/static/css/fontawesome.min.css" rel="stylesheet">
    <link href="{{.web_base_url}}/static/css/solid.min.css" rel="stylesheet">
    <link href="{{.web_base_url}}/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{.web_base_url}}/static/css/style.css?v={{.version}}" rel="stylesheet">
    <link href="{{.web_base_url}}/static/css/nps-shell.css?v={{.version}}" rel="stylesheet">
    <link href="{{.web_base_url}}/static/css/nps-forms.css?v={{.version}}" rel="stylesheet">
    <link href="{{.web_base_url}}/static/css/nps-lists.css?v={{.version}}" rel="stylesheet">
    <!-- Latest compiled and minified JavaScript -->
    <script src="{{.web_base_url}}/static/js/jquery-3.7.1.min.js"></script>
    <script src="{{.web_base_url}}/static/js/bootstrap.min.js"></script>
    <script src="{{.web_base_url}}/static/js/jsencrypt.min.js"></script>
    <script src="{{.web_base_url}}/static/js/crypto-js.min.js"></script>
    <script src="{{.web_base_url}}/static/js/nps-runtime.js?v={{.version}}" type="text/javascript"></script>
    <script src="{{.web_base_url}}/static/js/nps-i18n.js?v={{.version}}" type="text/javascript"></script>
    <script src="{{.web_base_url}}/static/js/nps-feedback.js?v={{.version}}" type="text/javascript"></script>
    <script src="{{.web_base_url}}/static/js/nps-ui.js?v={{.version}}" type="text/javascript"></script>
    {{.head_custom_code}}
</head>

<body class="login-page">
    <nav class="navbar navbar-static-top navbar-right navbar-login">
        <div class="ml-auto d-flex align-items-center nps-topbar-tools">
            <button id="theme-toggle" type="button" class="btn btn-outline-secondary" onclick="toggleTheme()">
                <i class="fa fa-moon"></i>
            </button>
            <span class="btn-group dropdown">
                <button id="languagemenu" class="btn btn-outline-primary dropdown-toggle" type="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                    <i class="fa fa-globe-asia fa-lg"></i>
                    <span></span>
                </button>
                <ul class="dropdown-menu"></ul>
            </span>
        </div>
    </nav>

    <div class="login-card">
        <div class="login-header">
            <img src="{{.web_base_url}}/static/img/nps.svg?v={{.version}}" alt="" langtag="application" langattr="alt" class="nps-brand-mark">
            <div class="navbar-brand nps-login-brand"><h1 langtag="title-login"></h1></div>
        </div>
        <div class="login-body">
            <form class="m-t" onsubmit="return false;">
                <div class="form-group position-relative">
                    <i class="fas fa-user-circle input-icon"></i>
                    <input class="form-control" langtag="word-username" langattr="placeholder" name="username" placeholder="" type="text">
                </div>
                <div class="form-group position-relative">
                    <i class="fas fa-key input-icon"></i>
                    <input class="form-control" langtag="word-password" langattr="placeholder" name="password" placeholder="" required="" type="password">
                </div>
                <div class="form-group captcha-group position-relative" data-nps-require-feature="open_captcha">
                    <div class="flex-fill">
                    <i class="fas fa-shield-alt input-icon"></i>
                    <input class="form-control" langtag="word-captcha" langattr="placeholder" name="captcha" placeholder="">
                    </div>
                    <div class="captcha-container">
                    {{.captcha_html}}
                    </div>
                </div>
                <button id="loginBtn" class="btn btn-primary block full-width m-b" langtag="word-login" onclick="if (this.form.reportValidity()) login()" type="submit"></button>
                <p class="text-muted text-center" data-nps-require-feature="allow_user_register">
                    <small langtag="info-noaccount"></small>
                    <small><a href="{{.web_base_url}}/login/register" langtag="word-register" data-nps-page-controller="login" data-nps-page-action="register"></a></small>
                </p>
            </form>
    </div>
    <div class="footer">
        <div class="float-right">
            <span langtag="word-readmore"></span>
            <strong><a href="https://github.com/djylb/nps" langtag="word-go"></a></strong>
        </div>
        <div><strong langtag="word-copyright"></strong> <span langtag="application"></span> &copy; 2018-{{.year}}</div>
    </div>

    <script type="text/javascript">
        var runtimeConfig = Object.assign({}, {{.runtime_config_json}}, {
            publicKey: `{{.public_key}}`,
            loginNonce: "{{.login_nonce}}",
            loginDelay: {{.login_delay}},
            totpLen: {{.totp_len}},
            powBits: {{.pow_bits}},
            powEnable: {{.pow_enable}},
            lastAttempt: Date.now(),
            timeOffset: 0
        });
        window.nps = window.nps.mergeConfig(runtimeConfig);
        function syncAuthFormFeatures() {
            window.nps.syncConditionalVisibility(document);
            var allowVkey = window.nps.featureEnabled('allow_user_vkey_login');
            $('input[name="username"]').prop('required', !allowVkey);
            var captchaEnabled = window.nps.featureEnabled('open_captcha');
            $('input[name="captcha"]').prop('required', captchaEnabled);
            if (!captchaEnabled) {
                $('input[name="captcha"]').val('');
            }
        }
        function refreshCaptchaIfEnabled() {
            if (!window.nps.featureEnabled('open_captcha')) {
                return;
            }
            var $img = $('.captcha-img');
            if ($img.length) {
                $img.trigger('click');
            }
            $('input[name="captcha"]').val('');
        }
        syncAuthFormFeatures();
        function syncServerTime() {
            var t0 = Date.now();
            $.ajax({
                url: window.nps.actionPath('auth', 'gettime'),
                dataType: "json",
                cache: false,
                timeout: 5000,
                success: function (res) {
                    if (!res || res.time == null) return;
                    var t3 = Date.now();
                    var server = res.time * 1000;
                    if (server == null) return;
                    var rtt = t3 - t0;
                    var estServerAtT3 = server + Math.floor(rtt / 2);
                    window.nps.timeOffset = estServerAtT3 - t3;
                }
            });
        }
        const loginBtn = document.getElementById('loginBtn');
        const rsaEncryptor = new JSEncrypt();
        rsaEncryptor.setPublicKey(window.nps.publicKey);
        function loginPowTimeoutMessage() {
            return window.nps.langText('info-login-pow-timeout', '');
        }
        function encryptWithRSA(plain) {
            return rsaEncryptor.encrypt(plain);
        }
        async function sha256Uint8(encPwd, nonce) {
            const hex = CryptoJS.SHA256(encPwd + nonce).toString(CryptoJS.enc.Hex);
            const out = new Uint8Array(hex.length >> 1);
            for (let i = 0; i < out.length; i++) {
                out[i] = parseInt(hex.substr(i << 1, 2), 16);
            }
            return out;
        }
        function prefixZero(hashBytes, bits) {
            const full = bits >> 3, rem = bits & 7;
            for (let i = 0; i < full; i++) if (hashBytes[i]) return false;
            return rem ? (hashBytes[full] & (0xFF << (8 - rem))) === 0 : true;
        }
        async function calcPowX(encPwd, bits, timeoutMs = 60000) {
            if (window.Worker) {
                return new Promise((resolve, reject) => {
                    const w = new Worker(window.nps.web_base_url + '/static/js/pow-worker.js');
                    const timer = setTimeout(() => {
                        w.terminate();
                        reject(new Error(loginPowTimeoutMessage()));
                    }, timeoutMs + 500);
                    w.onmessage = ({ data }) => {
                        if (data.ok) {
                            clearTimeout(timer);
                            w.terminate();
                            resolve(data.nonce.toString());
                        } else if (!data.progress) {
                            clearTimeout(timer);
                            w.terminate();
                            reject(new Error(loginPowTimeoutMessage()));
                        }
                    };
                    w.postMessage({ encPwd, bits, timeout: timeoutMs });
                });
            } else {
                const endTime = Date.now() + timeoutMs;
                let nonce = (Math.random() * 0xFFFFFFFF) >>> 0;
                while (Date.now() < endTime) {
                    const hash = await sha256Uint8(encPwd, nonce);
                    if (prefixZero(hash, bits)) return nonce.toString();
                    nonce = (nonce + 1) >>> 0;
                    if ((nonce & 0xFFF) === 0) await Promise.resolve();
                }
                throw new Error(loginPowTimeoutMessage());
            }
        }
        $(function () {
            syncServerTime();
        });
        async function login() {
            loginBtn.disabled = true;
            showMsg(window.nps.langText('reply.processing', ''), 'loading', 60000);
            await new Promise(requestAnimationFrame);
            await new Promise(resolve => setTimeout(resolve, 600));
            const data = Object.fromEntries(new FormData(document.querySelector('form')).entries());
            const ts = Date.now() + window.nps.timeOffset;
            const payload = JSON.stringify({
                n: window.nps.loginNonce,
                t: ts,
                p: data.password
            });
            const encPwd  = encryptWithRSA(payload);
            data.password = encPwd;
            const needPow = window.nps.powBits > 0 && (window.nps.powEnable || (data.captcha && data.captcha.length === window.nps.totpLen));
            if (needPow) {
                try {
                    data.powx = await calcPowX(encPwd, window.nps.powBits);
                    data.bits = window.nps.powBits;
                } catch (e) {
                    showMsg((e && e.message) ? e.message : loginPowTimeoutMessage(), 'error', 4000);
                    loginBtn.disabled = false;
                    return false;
                }
            }
            const now = Date.now();
            const wait = window.nps.loginDelay - (now - window.nps.lastAttempt);
            if (wait > 0) {
              await new Promise(r => setTimeout(r, wait));
            }
            window.nps.lastAttempt = Date.now();
            $.ajax({
                type: "POST",
                url : window.nps.actionPath('login', 'verify'),
                data: data,
                success: function (res) {
                    if (res.status) {
                        showMsg(langreply(res.msg), 'success', 1000, function () {
                            window.location.href = window.nps.management_shell || (window.nps.web_base_url + "/app");
                        });
                    } else {
                        refreshCaptchaIfEnabled();
                        showMsg(langreply(res.msg), 'error', 3000, function() {
                            loginBtn.disabled = false;
                            if (res.nonce) {
                                window.nps.loginNonce = res.nonce;
                            }
                            if (res.cert) {
                                window.nps.publicKey = res.cert;
                                rsaEncryptor.setPublicKey(res.cert);
                            }
                            if (res.timestamp) {
                                window.nps.timeOffset = res.timestamp - Date.now();
                            }
                            if (res.bits) {
                                window.nps.powBits = res.bits;
                                window.nps.powEnable = true;
                            }
                            syncAuthFormFeatures();
                        });
                    }
                },
                error: function (xhr, textStatus) {
                    console.error(textStatus);
                    window.location.reload();
                }
            });
            return false;
        }
    </script>
</body>
</html>
