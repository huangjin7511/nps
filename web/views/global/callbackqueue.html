<div class="wrapper wrapper-content animated fadeInRight">
    <div class="row">
        <div class="col-lg-12">
            <div class="ibox float-e-margins nps-list-shell">
                <div class="ibox-title">
                    <h5 class="nps-list-title" langtag="title-callback-queue-page"></h5>
                    <p class="nps-list-subtitle" langtag="info-callback-queue-page"></p>
                </div>
                <div class="ibox-content">
                    <div class="alert alert-info d-none" id="callback-queue-empty-platforms" langtag="info-no-callback-platform"></div>

                    <div id="callback-queue-content">
                        <div class="row m-b-md">
                            <div class="col-sm-8 col-md-6">
                                <label for="callback-queue-platform" langtag="word-platformfilter"></label>
                                <select class="form-control selectpicker" data-live-search="true" id="callback-queue-platform"></select>
                            </div>
                            <div class="col-sm-4 col-md-6">
                                <div class="nps-toolbar nps-toolbar-right m-t-md">
                                    <button class="btn btn-default" id="callback-queue-refresh" type="button">
                                        <i class="fa fa-refresh"></i>
                                        <span langtag="word-refresh"></span>
                                    </button>
                                    <button class="btn btn-default" id="callback-queue-replay" type="button">
                                        <i class="fa fa-repeat"></i>
                                        <span langtag="word-replay"></span>
                                    </button>
                                    <button class="btn btn-danger" id="callback-queue-clear" type="button">
                                        <i class="fa fa-trash"></i>
                                        <span langtag="word-clear"></span>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="row m-b-md">
                            <div class="col-sm-6 col-lg-4">
                                <div class="panel panel-default">
                                    <div class="panel-body">
                                        <div class="text-muted small" langtag="word-callbackurl"></div>
                                        <div class="font-bold" id="callback-queue-url">-</div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-sm-6 col-lg-2">
                                <div class="panel panel-default">
                                    <div class="panel-body">
                                        <div class="text-muted small" langtag="word-queuedcount"></div>
                                        <div class="font-bold" id="callback-queue-count">0</div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-sm-6 col-lg-2">
                                <div class="panel panel-default">
                                    <div class="panel-body">
                                        <div class="text-muted small" langtag="word-queuecapacity"></div>
                                        <div class="font-bold" id="callback-queue-capacity">0 / 0</div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-sm-6 col-lg-2">
                                <div class="panel panel-default">
                                    <div class="panel-body">
                                        <div class="text-muted small" langtag="word-lastqueued"></div>
                                        <div class="font-bold" id="callback-queue-last-queued">-</div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-sm-6 col-lg-2">
                                <div class="panel panel-default">
                                    <div class="panel-body">
                                        <div class="text-muted small" langtag="word-lastreplay"></div>
                                        <div class="font-bold" id="callback-queue-last-replay">-</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-striped table-hover">
                                <thead>
                                <tr>
                                    <th langtag="word-id"></th>
                                    <th langtag="word-name"></th>
                                    <th langtag="word-resource"></th>
                                    <th langtag="word-action"></th>
                                    <th langtag="word-sequence"></th>
                                    <th langtag="word-requestid"></th>
                                    <th langtag="word-created"></th>
                                    <th langtag="word-attempt"></th>
                                </tr>
                                </thead>
                                <tbody id="callback-queue-items">
                                <tr class="js-empty-row">
                                    <td class="text-muted" colspan="8" langtag="info-empty-callback-queue"></td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (function () {
        var $platform = $('#callback-queue-platform');
        var $refresh = $('#callback-queue-refresh');
        var $replay = $('#callback-queue-replay');
        var $clear = $('#callback-queue-clear');
        var $content = $('#callback-queue-content');
        var $empty = $('#callback-queue-empty-platforms');
        var currentPlatforms = [];

        function langText(path, fallback) {
            return window.nps.langText(path, arguments.length > 1 ? fallback : '');
        }

        function formatTimestamp(value) {
            return window.nps.formatUnixTimestamp(value) || '-';
        }

        function queueRoute(action) {
            if (action === 'replay') {
                return window.nps.nodeRoute('callback_queue_replay');
            }
            if (action === 'clear') {
                return window.nps.nodeRoute('callback_queue_clear');
            }
            return window.nps.nodeRoute('callback_queue');
        }

        function currentPlatformID() {
            return $.trim($platform.val() || '');
        }

        function findPlatform(platformID) {
            var match = null;
            currentPlatforms.forEach(function (item) {
                if (item && item.platform_id === platformID) {
                    match = item;
                }
            });
            return match;
        }

        function renderPlatformMeta(platform) {
            var queueSize = platform ? (platform.callback_queue_size || 0) : 0;
            var queueMax = platform ? (platform.callback_queue_max || 0) : 0;
            $('#callback-queue-url').text((platform && platform.callback_url) ? platform.callback_url : '-');
            $('#callback-queue-count').text(queueSize);
            $('#callback-queue-capacity').text(queueSize + ' / ' + queueMax);
            $('#callback-queue-last-queued').text(formatTimestamp(platform && platform.last_callback_queued_at));
            $('#callback-queue-last-replay').text(formatTimestamp(platform && platform.last_callback_replay_at));
        }

        function renderItems(items) {
            var $tbody = $('#callback-queue-items');
            $tbody.empty();
            if (!items || !items.length) {
                $tbody.append('<tr class="js-empty-row"><td colspan="8" class="text-muted">' + langText('info-empty-callback-queue') + '</td></tr>');
                return;
            }
            items.forEach(function (item) {
                var row = $('<tr/>');
                row.append($('<td/>').text(item.id || ''));
                row.append($('<td/>').text(item.event_name || ''));
                row.append($('<td/>').text(item.event_resource || ''));
                row.append($('<td/>').text(item.event_action || ''));
                row.append($('<td/>').text(item.event_sequence || ''));
                row.append($('<td/>').text(item.request_id || ''));
                row.append($('<td/>').text(formatTimestamp(item.enqueued_at)));
                row.append($('<td/>').text((item.attempts || 0) + (item.last_attempt_at ? (' / ' + formatTimestamp(item.last_attempt_at)) : '')));
                $tbody.append(row);
            });
        }

        function setBusy(busy) {
            var disabled = !!busy || !currentPlatformID();
            $platform.prop('disabled', !!busy);
            $refresh.prop('disabled', disabled);
            $replay.prop('disabled', disabled);
            $clear.prop('disabled', disabled);
            if ($.fn.selectpicker) {
                $platform.selectpicker('refresh');
            }
        }

        function toggleEmptyState(showEmpty) {
            $content.toggleClass('d-none', !!showEmpty);
            $empty.toggleClass('d-none', !showEmpty);
        }

        function buildPlatformOptions(platforms) {
            var initialPlatformID = $.trim(window.nps.pageParam('platform_id') || '');
            var selected = initialPlatformID;
            $platform.empty();
            platforms.forEach(function (platform, index) {
                var scopeText = platform.control_scope ? langText('word-controlscope-' + platform.control_scope) : '';
                var text = platform.platform_id + (scopeText ? (' (' + scopeText + ')') : '');
                var option = $('<option/>')
                    .val(platform.platform_id)
                    .text(text);
                if (!selected && index === 0) {
                    selected = platform.platform_id;
                }
                if (selected === platform.platform_id) {
                    option.prop('selected', true);
                }
                $platform.append(option);
            });
            if ($.fn.selectpicker) {
                $platform.selectpicker('refresh');
            }
        }

        function loadPlatforms() {
            return window.nps.fetchNodeData(window.nps.nodeRoute('status')).then(function (data) {
                var platforms = $.isArray(data.management_platforms) ? data.management_platforms.filter(function (platform) {
                    return !!platform.callback_enabled;
                }) : [];
                currentPlatforms = platforms;
                if (!platforms.length) {
                    toggleEmptyState(true);
                    return;
                }
                toggleEmptyState(false);
                buildPlatformOptions(platforms);
            });
        }

        function loadQueue() {
            var platformID = currentPlatformID();
            if (!platformID) {
                renderPlatformMeta(null);
                renderItems([]);
                setBusy(false);
                return;
            }
            setBusy(true);
            $.ajax({
                type: 'GET',
                url: queueRoute() + '?platform_id=' + encodeURIComponent(platformID) + '&limit=100',
                dataType: 'json',
                success: function (res) {
                    var platforms = res && res.data && $.isArray(res.data.platforms) ? res.data.platforms : [];
                    var platform = null;
                    platforms.forEach(function (item) {
                        if (item && item.platform_id === platformID) {
                            platform = item;
                        }
                    });
                    if (!platform) {
                        platform = findPlatform(platformID);
                    }
                    renderPlatformMeta(platform);
                    renderItems(platform ? platform.items : []);
                },
                error: function () {
                    showMsg(langText('info-callback-queue-load-failed'), 'error', 3000);
                },
                complete: function () {
                    setBusy(false);
                }
            });
        }

        function mutateQueue(action) {
            var platformID = currentPlatformID();
            if (!platformID) {
                return;
            }
            var confirmText = action === 'replay'
                ? langText('info-callback-queue-replay-confirm')
                : langText('info-callback-queue-clear-confirm');
            if (!confirm(confirmText)) {
                return;
            }
            setBusy(true);
            $.ajax({
                type: 'POST',
                url: queueRoute(action),
                dataType: 'json',
                data: {platform_id: platformID},
                success: function (res) {
                    if (!res || res.code !== 1) {
                        showMsg(langText('info-callback-queue-action-failed'), 'error', 3000);
                        return;
                    }
                    showMsg(
                        action === 'replay'
                            ? langText('info-callback-queue-replay-triggered')
                            : langText('info-callback-queue-cleared'),
                        'success',
                        1000,
                        function () {
                            loadQueue();
                        }
                    );
                },
                error: function () {
                    showMsg(langText('info-callback-queue-action-failed'), 'error', 3000);
                },
                complete: function () {
                    setBusy(false);
                }
            });
        }

        $platform.on('change', loadQueue);
        $refresh.on('click', loadQueue);
        $replay.on('click', function () {
            mutateQueue('replay');
        });
        $clear.on('click', function () {
            mutateQueue('clear');
        });

        $(function () {
            loadPlatforms().then(function () {
                loadQueue();
            });
        });

        window.internationalized = function () {
            loadPlatforms().then(function () {
                loadQueue();
            });
        };
    })();
</script>
