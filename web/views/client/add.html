<div class="row tile">
    <div class="col-md-12 col-md-auto">
        <div class="ibox float-e-margins nps-form-shell">
            <div class="ibox-title">
                <h3 class="nps-form-title" langtag="page-clientadd"></h3>
                <p class="nps-form-subtitle" langtag="info-client-add-subtitle"></p>
            </div>
            <div class="ibox-content">
                <form class="form-horizontal">
                    <div class="form-group" id="remark">
                        <label class="control-label font-bold" langtag="word-remark"></label>
                        <div class="col-sm-12">
                            <input class="form-control" langtag="word-remark" name="remark" placeholder="" type="text">
                        </div>
                    </div>
                    <div class="form-group" id="flow_limit" data-nps-require-feature="allow_flow_limit">
                        <label class="control-label font-bold" langtag="word-flowlimit"></label>
                        <div class="col-sm-12">
                            <input class="form-control" langtag="info-bytes-unlimited-placeholder" name="flow_limit" placeholder="" type="text">
                            <span class="help-block m-b-none" langtag="info-client-flow-limit-help"></span>
                        </div>
                    </div>
                    <div class="form-group" id="time_limit" data-nps-require-feature="allow_time_limit">
                        <label class="control-label font-bold" langtag="word-timelimit"></label>
                        <div class="col-sm-12">
                            <input class="form-control" id="time_limit_input" langtag="info-datetime-or-unix-placeholder" name="time_limit" placeholder="" type="text">
                            <span class="help-block m-b-none" langtag="info-client-expire-help"></span>
                        </div>
                    </div>
                    <div class="form-group" id="rate_limit" data-nps-require-feature="allow_rate_limit">
                        <label class="control-label font-bold" langtag="word-ratelimit"></label>
                        <div class="col-sm-12">
                            <input class="form-control" langtag="info-unrestricted" name="rate_limit" placeholder="" type="text">
                            <span class="help-block m-b-none" langtag="word-unit"></span>: <span langtag="unit-kilobyte-per-second"></span>
                        </div>
                    </div>
                    <div class="form-group" id="max_conn" data-nps-require-feature="allow_connection_num_limit">
                        <label class="control-label font-bold" langtag="word-maxconnections"></label>
                        <div class="col-sm-12">
                            <input class="form-control" langtag="info-unrestricted" name="max_conn" placeholder="" type="text">
                        </div>
                    </div>
                    <div class="form-group" id="max_tunnel" data-nps-require-feature="allow_tunnel_num_limit">
                        <label class="control-label font-bold" langtag="word-maxtunnels"></label>
                        <div class="col-sm-12">
                            <input class="form-control" langtag="info-unrestricted" name="max_tunnel" placeholder="" type="text">
                        </div>
                    </div>
                    <div class="form-group" id="u">
                        <label class="control-label font-bold" langtag="word-basicusername"></label>
                        <div class="col-sm-12">
                            <input class="form-control" langtag="info-unrestricted" name="u" placeholder="" type="text">
                            <span class="help-block m-b-none" langtag="info-onlyproxy"></span>
                        </div>
                    </div>
                    <div class="form-group" id="p">
                        <label class="control-label font-bold" langtag="word-basicpassword"></label>
                        <div class="col-sm-12">
                            <input class="form-control" langtag="info-unrestricted" name="p" placeholder="" type="text">
                            <span class="help-block m-b-none" langtag="info-onlyproxy"></span>
                        </div>
                    </div>
                    <div class="form-group" id="vkey">
                        <label class="control-label font-bold" langtag="word-verifyKey"></label>
                        <div class="col-sm-12">
                            <input class="form-control" langtag="info-unrestricted" name="vkey" placeholder="" type="text">
                            <span class="help-block m-b-none" langtag="info-autogenerated"></span>
                        </div>
                    </div>
                    <div class="form-group" id="user_id" data-nps-require-admin="true">
                        <label class="control-label font-bold" langtag="word-owneruser"></label>
                        <div class="col-sm-12">
                            <select class="form-control" name="user_id" data-live-search="true"></select>
                            <span class="help-block m-b-none" langtag="info-owner-user-help"></span>
                        </div>
                    </div>
                    <div class="form-group" id="manager_user_ids" data-nps-require-admin="true">
                        <label class="control-label font-bold" langtag="word-manageruserids"></label>
                        <div class="col-sm-12">
                            <textarea class="form-control" langtag="info-manager-user-ids-placeholder" name="manager_user_ids" placeholder="" rows="3"></textarea>
                            <span class="help-block m-b-none" langtag="info-manager-user-ids-help"></span>
                        </div>
                    </div>
                    <div class="form-group" id="config_conn_allow">
                        <label class="control-label font-bold" langtag="word-connectbyconfig"></label>
                        <div class="col-sm-12">
                            <select class="form-control selectpicker" name="config_conn_allow">
                                <option langtag="word-yes" value="1"></option>
                                <option langtag="word-no" value="0"></option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group" id="compress">
                        <label class="control-label font-bold" langtag="word-compress"></label>
                        <div class="col-sm-12">
                            <select class="form-control selectpicker" name="compress">
                                <option langtag="word-no" value="0"></option>
                                <option langtag="word-yes" value="1"></option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group" id="crypt">
                        <label class="control-label font-bold" langtag="word-crypt"></label>
                        <div class="col-sm-12">
                            <select class="form-control selectpicker" name="crypt">
                                <option langtag="word-no" value="0"></option>
                                <option langtag="word-yes" value="1"></option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group" id="entry_acl_mode">
                        <label class="control-label font-bold" langtag="word-entryacl"></label>
                        <div class="col-sm-12">
                            <select class="form-control selectpicker" name="entry_acl_mode">
                                <option langtag="word-disable" value="0"></option>
                                <option langtag="word-whitelist" value="1"></option>
                                <option langtag="word-blacklist" value="2"></option>
                            </select>
                            <span class="help-block m-b-none" langtag="info-entryacl"></span>
                        </div>
                    </div>
                    <div class="form-group" id="entry_acl_rules">
                        <label class="control-label font-bold" langtag="word-entryaclrules"></label>
                        <div class="col-sm-12">
                            <textarea class="form-control" name="entry_acl_rules" placeholder="" rows="4" type="text"></textarea>
                            <span class="help-block m-b-none" langtag="info-entryaclrules"></span>
                        </div>
                    </div>
                    <div class="hr-line-dashed"></div>
                    <div class="form-group nps-form-actions">
                        <div class="col-lg-12">
                            <button class="btn btn-secondary" onclick="window.history.back()" type="button">
                                <i class="fa fa-fw fa-lg fa-window-close"></i> <span langtag="word-cancel"></span>
                            </button>
                            <button class="btn btn-success"
                                    data-nps-require-node-action="clients/add"
                                    onclick="submitClientAdd()"
                                    type="button">
                                <i class="fa fa-fw fa-lg fa-check-circle"></i> <span langtag="word-add"></span>
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function canAddClientForm() {
        return window.nps.nodeActionAvailable('clients/add');
    }

    function applyClientAddReadOnlyState() {
        if (!canAddClientForm()) {
            window.nps.applyReadOnlyForm('form.form-horizontal', {
                message: window.nps.langText('info-readonly-client', '')
            });
        }
    }

    function submitClientAdd() {
        if (!canAddClientForm()) {
            return;
        }
        window.nps.submitFormAction('add', window.nps.nodeMutation('client', 'add'), $('form').serializeArray());
    }

    function toggleOwnerBoundLimitFields() {
        if (!$("select[name='user_id']").length) {
            return;
        }
        var hasOwnerUser = !!$("select[name='user_id']").val();
        ["#flow_limit", "#time_limit"].forEach(function (selector) {
            if ($(selector).length) {
                $(selector).css("display", hasOwnerUser ? "none" : "block");
            }
        });
    }

    function getUserList() {
        if (!$("select[name='user_id']").length) {
            return;
        }
        window.nps.initRemoteSelectPicker("select[name='user_id']", {
            method: 'GET',
            url: window.nps.nodeRoute('users'),
            includeEmpty: true,
            onLoaded: toggleOwnerBoundLimitFields,
            mapItem: function (item) {
                return {
                    value: item.id,
                    text: item.username + " (#" + item.id + ")"
                };
            }
        });
    }

    $(function () {
        function toggleEntryAclRules() {
            var modeVal = $("select[name='entry_acl_mode']").val();
            var mode = parseInt(modeVal ? modeVal : "0", 10);
            $("#entry_acl_rules").css("display", mode === 0 ? "none" : "block");
        }

        $(document).on("change", "select[name='user_id']", toggleOwnerBoundLimitFields);
        $("select[name='entry_acl_mode']").on("change", toggleEntryAclRules);
        getUserList();
        toggleOwnerBoundLimitFields();
        toggleEntryAclRules();
        window.nps.syncConditionalVisibility(document.querySelector('.nps-form-actions'));
        applyClientAddReadOnlyState();
    });

    function internationalized(current) {
        $.fn.selectpicker.defaults = {
            noneSelectedText: languages['content']['bootstrap-select']['noneSelectedText'][current],
            noneResultsText: languages['content']['bootstrap-select']['noneResultsText'][current]
        };
        getUserList();
        applyClientAddReadOnlyState();
    }
</script>
