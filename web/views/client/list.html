<div class="wrapper wrapper-content animated fadeInRight">
    <div class="row">
        <div class="col-lg-12">
            <div class="ibox float-e-margins nps-list-shell">
                <div class="ibox-title">
                    <h5 class="nps-list-title" langtag="page-clientlist"></h5>
                    <p class="nps-list-subtitle" langtag="info-client-list-subtitle"></p>
                    <div class="ibox-tools">
                        <a class="collapse-link">
                            <i class="fa fa-chevron-up"></i>
                        </a>
                        <a class="close-link">
                            <i class="fa fa-times"></i>
                        </a>
                    </div>
                </div>
                <div class="content">
                    <div class="table-responsive">
                        <div id="toolbar">
                            <div class="d-flex w-100 flex-wrap align-items-center">
                                <a class="btn btn-primary mr-2"
                                   href="{{.web_base_url}}/client/add"
                                   data-nps-page-controller="client"
                                   data-nps-page-action="add"
                                   data-nps-require-page-controller="client"
                                   data-nps-require-page-action="add"
                                   data-nps-require-node-action="clients/add">
                                    <i class="fa fa-fw fa-lg fa-plus"></i>
                                    <span langtag="word-add"></span>
                                </a>
                                <a class="btn btn-danger mr-2"
                                   data-nps-require-node-action="clients/clear_all"
                                   onclick="window.nps.submitFormAction('clear', window.nps.clientActions.clearAll, {'id': 0, 'mode': 'flow'})">
                                    <i class="fa fa-fw fa-lg fa-eraser"></i>
                                    <span langtag="word-clearflow"></span>
                                </a>
                                <a class="btn btn-warning"
                                   data-nps-require-node-action="clients/ping"
                                   onclick="triggerVisibleClientPing(this)">
                                    <i class="fa fa-fw fa-lg fa-signal"></i>
                                    <span langtag="word-ping"></span>
                                </a>
                                <div class="btn-group mr-2 mt-2 mt-md-0"
                                     data-nps-require-any-node-actions="clients/status,clients/delete,clients/clear">
                                    <button type="button" class="btn btn-outline btn-primary client-bulk-action" id="client-bulk-start" onclick="runSelectedClientBatch('start')" disabled>
                                        <i class="fa fa-play"></i>
                                        <span langtag="word-start"></span>
                                    </button>
                                    <button type="button" class="btn btn-outline btn-warning client-bulk-action" id="client-bulk-stop" onclick="runSelectedClientBatch('stop')" disabled>
                                        <i class="fa fa-pause"></i>
                                        <span langtag="word-stop"></span>
                                    </button>
                                    <button type="button"
                                            class="btn btn-outline btn-info client-bulk-action"
                                            id="client-bulk-clear"
                                            data-nps-require-node-action="clients/clear"
                                            onclick="runSelectedClientBatch('clear')"
                                            disabled>
                                        <i class="fa fa-eraser"></i>
                                        <span langtag="word-clearflow"></span>
                                    </button>
                                    <button type="button"
                                            class="btn btn-outline btn-danger client-bulk-action"
                                            id="client-bulk-delete"
                                            data-nps-require-node-action="clients/delete"
                                            onclick="runSelectedClientBatch('delete')"
                                            disabled>
                                        <i class="fa fa-trash"></i>
                                        <span langtag="word-delete"></span>
                                    </button>
                                </div>
                                <button type="button"
                                        class="btn btn-outline btn-default mr-2 mt-2 mt-md-0 client-bulk-action"
                                        id="client-bulk-reset"
                                        data-nps-require-any-node-actions="clients/status,clients/delete,clients/clear"
                                        onclick="window.nps.clearTableSelections('#table')"
                                        disabled>
                                    <i class="fa fa-times"></i>
                                    <span langtag="word-cancel"></span>
                                </button>
                                <span class="text-muted small align-self-center mt-2 mt-md-0"
                                      id="client-bulk-selection-summary"
                                      data-nps-require-any-node-actions="clients/status,clients/delete,clients/clear"></span>
                            </div>
                        </div>
                        <table class="table-striped table-hover" data-mobile-responsive="true" id="taskList_table"></table>
                    </div>
                </div>
                <div class="ibox-content">
                    <table id="table"></table>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="qrModal" tabindex="-1" role="dialog" aria-labelledby="qrModalLabel" aria-hidden="true" data-backdrop="false" data-keyboard="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="qrModalLabel" langtag="word-totp"></h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="" langtag="word-close" langattr="aria-label">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body text-center">
                <img id="qrImg" src="" alt="" langtag="word-qrcode" langattr="alt" class="nps-qr-image" />
            </div>
        </div>
    </div>
</div>

<script>
    var clientPageDisplay = {};

    window.nps.clientActions = {
        list: window.nps.nodeRoute('clients'),
        clearAll: window.nps.nodeMutation('client', 'clear'),
        clear: function (id) { return window.nps.nodeMutation('client', 'clear', id); },
        changeStatus: function (id) { return window.nps.nodeMutation('client', 'status', id); },
        del: function (id) { return window.nps.nodeMutation('client', 'delete', id); },
        ping: function (id) { return window.nps.nodeMutation('client', 'ping', id); },
        connections: function (id) {
            return {
                method: 'GET',
                url: window.nps.nodeResourcePath('clients', id, 'connections')
            };
        }
    };

    function clientFlow(row) {
        return ((row.Flow && row.Flow.InletFlow) || 0) + ((row.Flow && row.Flow.ExportFlow) || 0);
    }

    function clientHasOwnerUser(row) {
        return clientOwnerUserID(row) > 0;
    }

    function clientOwnerUserID(row) {
        return row.OwnerUserID || row.UserId || 0;
    }

    function clientLifecycleInheritedText() {
        return clientLang('info-inherited-owner-user');
    }

    function clientLang(id, fallback) {
        return window.nps.langText(id, arguments.length > 1 ? fallback : '');
    }

    function clientFormat(id, replacements, fallback) {
        return window.nps.langFormat(id, replacements, arguments.length > 2 ? fallback : '');
    }

    function clientDisplayBridge() {
        return clientPageDisplay.bridge || {};
    }

    function clientDisplayTransport(name) {
        return clientDisplayBridge()[String(name || '').toLowerCase()] || {};
    }

    function clientBinaryName() {
        return './npc' + (clientPageDisplay.client_binary_suffix || '');
    }

    function clientCommandSnippet(labelTag, transportName, row) {
        var transport = clientDisplayTransport(transportName);
        if (!transport.enabled || !transport.addr) {
            return '';
        }
        return '<b langtag="' + labelTag + '"></b>: <code onclick="oCopy(this)">' +
            clientBinaryName() + ' -server="' + transport.addr + '" -vkey="' + row.VerifyKey + '" -type="' + (transport.type || transportName) + '"' +
            '</code>&emsp;<br/><br/>';
    }

    function clientOwnerDisplay(row) {
        return clientHasOwnerUser(row)
            ? (clientLang('word-user') + ' #' + clientOwnerUserID(row))
            : clientLang('word-platformmanaged');
    }

    function clientSourceTypeText(value) {
        var normalized = String(value || 'node_admin').toLowerCase().replace(/_/g, '-');
        return clientLang('word-sourcetype-' + normalized) || clientLang('word-na');
    }

    function clientRateUnitText() {
        return clientLang('unit-kilobyte-per-second');
    }

    function clientPerSecondUnitText() {
        return clientLang('unit-per-second');
    }

    function formatClientExpireAtValue(value) {
        if (!value) {
            return '<span langtag="word-false"></span>';
        }
        return new Date(value * 1000).toLocaleString();
    }

    function formatClientExpireAt(row) {
        if (clientHasOwnerUser(row)) {
            return clientLifecycleInheritedText();
        }
        return formatClientExpireAtValue(row.ExpireAt);
    }

    function formatClientFlowLimit(row) {
        if (clientHasOwnerUser(row)) {
            return clientLifecycleInheritedText();
        }
        if (!row.FlowLimit) {
            return '<span langtag="word-false"></span>';
        }
        return changeunit(row.FlowLimit);
    }

    function formatClientFlowRemain(row) {
        if (clientHasOwnerUser(row)) {
            return clientLifecycleInheritedText();
        }
        if (!row.FlowLimit) {
            return '<span langtag="word-false"></span>';
        }
        return changeunit(row.FlowLimit - clientFlow(row));
    }

    function clientExpireAtIso(row) {
        if (!row.ExpireAt) {
            return '0001-01-01T00:00:00Z';
        }
        return new Date(row.ExpireAt * 1000).toISOString();
    }

    function canCreateClient() {
        return window.nps.pageAvailable('client', 'add') && window.nps.nodeActionAvailable('clients/add');
    }

    function canManageClientStatus() {
        return window.nps.nodeActionAvailable('clients/status');
    }

    function canDeleteClient() {
        return window.nps.nodeActionAvailable('clients/delete');
    }

    function canEditClient() {
        return window.nps.pageAvailable('client', 'edit') && window.nps.nodeActionAvailable('clients/edit');
    }

    function canClearClient() {
        return window.nps.nodeActionAvailable('clients/clear');
    }

    function canClearAllClients() {
        return window.nps.nodeActionAvailable('clients/clear_all');
    }

    function canPingClients() {
        return window.nps.nodeActionAvailable('clients/ping');
    }

    function canInspectClientConnections() {
        return window.nps.nodeActionAvailable('clients/connections');
    }

    function canBulkManageClients() {
        return window.nps.anyNodeActionAvailable(['clients/status', 'clients/delete', 'clients/clear']);
    }

    function canViewClientTunnels() {
        return window.nps.pageAvailable('index', 'all');
    }

    function canViewClientHosts() {
        return window.nps.pageAvailable('index', 'hostlist');
    }

    function canShowClientOwnerMeta() {
        return window.nps.isAdmin();
    }

    function clientClearAction(row, mode, content, options) {
        var settings = options || {};
        if (!canClearClient()) {
            return content;
        }
        if (settings.skipInherited && clientHasOwnerUser(row)) {
            return content;
        }
        return '<span onclick="window.nps.submitFormAction(\'clear\', window.nps.clientActions.clear(' + row.Id + '), {\'id\':' + row.Id + ', \'mode\': \'' + mode + '\'})">' + content + '</span>';
    }

    function clientConnectionContainerID(id) {
        return 'client-runtime-instances-' + id;
    }

    function clientConnectionText(value) {
        if (value === null || value === undefined || value === '') {
            return clientLang('word-none');
        }
        return escapeHtml(String(value));
    }

    function clientConnectionCopyText(value) {
        if (value === null || value === undefined || value === '') {
            return clientLang('word-none');
        }
        return '<span onclick="oCopy(this)">' + escapeHtml(String(value)) + '</span>';
    }

    function clientConnectionStatusText(item) {
        if (!item) {
            return clientLang('word-offline');
        }
        var parts = [];
        parts.push(item.is_online ? clientLang('word-online') : clientLang('word-offline'));
        if (item.has_signal) {
            parts.push(clientLang('word-signal', 'Signal'));
        }
        if (item.has_tunnel) {
            parts.push(clientLang('word-tunnel'));
        }
        return parts.join(' / ');
    }

    function formatClientDirectionalRate(total, inlet, outlet) {
        return changeunit(total || 0) + clientPerSecondUnitText() +
            ' (' + changeunit(inlet || 0) + clientPerSecondUnitText() +
            ' in / ' + changeunit(outlet || 0) + clientPerSecondUnitText() + ' out)';
    }

    function renderClientRuntimeInstances(items) {
        if (!items || !items.length) {
            return '<span class="text-muted">' + escapeHtml(clientLang('info-client-runtime-instances-empty', 'No runtime instances.')) + '</span>';
        }
        var html = [];
        $.each(items, function (_, item) {
            item = item || {};
            html.push('<div class="m-b-md">');
            html.push('<b>' + escapeHtml(clientLang('word-runtimeuuid', 'Runtime UUID')) + '</b>: ' + clientConnectionCopyText(item.uuid) + '&emsp;');
            html.push('<b langtag="word-version"></b>: ' + clientConnectionText(item.version) + '&emsp;');
            html.push('<b>' + escapeHtml(clientLang('word-runtimebaseversion', 'Base Version')) + '</b>: ' + clientConnectionText(item.base_ver || '') + '&emsp;');
            html.push('<b>' + escapeHtml(clientLang('word-connectedat', 'Connected At')) + '</b>: ' + clientConnectionText(item.connected_at_text) + '&emsp;');
            html.push('<b langtag="word-status"></b>: ' + clientConnectionText(clientConnectionStatusText(item)) + '&emsp;<br/><br/>');
            html.push('<b langtag="word-address"></b>: ' + clientConnectionCopyText(item.remote_addr) + '&emsp;');
            html.push('<b langtag="word-localaddress"></b>: ' + clientConnectionCopyText(item.local_addr) + '&emsp;');
            html.push('<b langtag="word-curconnections"></b>: ' + clientConnectionText(item.now_conn || 0) + '&emsp;<br/><br/>');
            html.push('<b langtag="word-totalflow"></b>: ' + changeunit(item.total_bytes || 0) + '&emsp;');
            html.push('<b langtag="word-speed"></b>: ' + formatClientDirectionalRate(item.total_now_rate_total_bps, item.total_now_rate_in_bps, item.total_now_rate_out_bps) + '&emsp;<br/><br/>');
            html.push('<b>' + escapeHtml(clientLang('word-service', 'Service')) + '</b>: ' + changeunit(item.service_total_bytes || 0) + ' / ' + formatClientDirectionalRate(item.service_now_rate_total_bps, item.service_now_rate_in_bps, item.service_now_rate_out_bps) + '&emsp;');
            html.push('<b>' + escapeHtml(clientLang('word-bridge', 'Bridge')) + '</b>: ' + changeunit(item.bridge_total_bytes || 0) + ' / ' + formatClientDirectionalRate(item.bridge_now_rate_total_bps, item.bridge_now_rate_in_bps, item.bridge_now_rate_out_bps) + '&emsp;');
            html.push('</div>');
        });
        return html.join('');
    }

    function loadClientRuntimeInstances(row, $detail) {
        if (!canInspectClientConnections() || !row || !row.Id) {
            return;
        }
        var containerID = clientConnectionContainerID(row.Id);
        var $container = $detail.find('#' + containerID);
        if (!$container.length || $container.data('loading')) {
            return;
        }
        if (Number(row.ConnectionCount || 0) <= 0) {
            $container.html('<span class="text-muted">' + escapeHtml(clientLang('info-client-runtime-instances-empty', 'No runtime instances.')) + '</span>');
            return;
        }
        var request = window.nps.clientActions.connections(row.Id);
        $container
            .data('loading', true)
            .html('<span class="text-muted">' + escapeHtml(clientLang('info-client-runtime-instances-loading', 'Loading runtime instances...')) + '</span>');
        $.ajax({
            url: request.url,
            type: request.method,
            dataType: 'json'
        }).done(function (response) {
            var rows = window.nps.resourceListResponseHandler(response, function (item) {
                return item || {};
            }).rows || [];
            $container.html(renderClientRuntimeInstances(rows));
        }).fail(function () {
            $container.html('<span class="text-danger">' + escapeHtml(clientLang('word-error-short')) + '</span>');
        }).always(function () {
            $container.removeData('loading');
            $('body').setLang('#' + containerID);
        });
    }

    function initClientTable() {
    $('#table').bootstrapTable({
        toolbar: '#toolbar',
        method: 'get',
        url: window.nps.clientActions.list,
        striped: true,
        search: true,
        showHeader: true,
        showColumns: true,
        showRefresh: true,
        pagination: true,
        sidePagination: 'server',
        pageNumber: 1,
        pageList: [5, 10, 20, 50, 100, 'all'],
        cookie: true,
        cookieIdTable: 'client',
        cookieStorage: 'localStorage',
        idField: 'Id',
        uniqueId: 'Id',
        maintainMetaData: true,
        detailView: true,
        smartDisplay: true,
        queryParams: function (params) {
            return window.nps.resourceListQueryParams(params);
        },
        responseHandler: function (response) {
            return window.nps.resourceListResponseHandler(response, window.nps.adaptNodeClientResource);
        },
        onExpandRow: function (index, row, $detail) {
            $('body').setLang('.detail-view');
            loadClientRuntimeInstances(row, $detail);
        },
        onPostBody: function () {
            if ($(this)[0].locale !== undefined) {
                $('body').setLang('#table');
            }
        },
        detailFormatter: function (index, row) {
            var tmp = '<b langtag="word-maxconnections"></b>: ';
            tmp += clientClearAction(row, 'conn_limit', row.MaxConn);
            tmp += '&emsp;';
            tmp += '<b langtag="word-curconnections"></b>: ' + row.NowConn + '&emsp;';
            tmp += '<b>' + clientLang('word-runtimeinstances', 'Runtime Instances') + '</b>: ' + (row.ConnectionCount || 0) + '&emsp;';
            tmp += '<b langtag="word-flowlimit"></b>: ';
            tmp += clientClearAction(row, 'flow_limit', formatClientFlowLimit(row), {skipInherited: true});
            tmp += '&emsp;';
            tmp += '<b langtag="word-timelimit"></b>: ';
            tmp += clientClearAction(row, 'time_limit', formatClientExpireAt(row), {skipInherited: true});
            tmp += '&emsp;';
            tmp += '<b langtag="word-ratelimit"></b>: ';
            tmp += clientClearAction(row, 'rate_limit', row.RateLimit);
            tmp += clientRateUnitText() + '&emsp;';
            tmp += '<b langtag="word-maxtunnels"></b>: ';
            tmp += clientClearAction(row, 'tunnel_limit', row.MaxTunnelNum);
            tmp += '&emsp;<br/><br/>';
            tmp += '<b langtag="word-createtime"></b>: ' + row.CreateTime + '&emsp;';
            tmp += '<b langtag="word-lastonlinetime"></b>: ' + row.LastOnlineTime + '&emsp;';
            tmp += '<b langtag="word-address"></b>: <span onclick="oCopy(this)">' + row.Addr + '</span>&emsp;';
            tmp += '<b langtag="word-localaddress"></b>: <span onclick="oCopy(this)">' + row.LocalAddr + '</span>&emsp;<br/><br/>';
            if (canShowClientOwnerMeta()) {
                tmp += '<b>' + clientLang('word-owneruser') + '</b>: ' + clientOwnerDisplay(row) + '&emsp;';
                tmp += '<b>' + clientLang('word-manageruserids') + '</b>: ' + ((row.ManagerUserIDs && row.ManagerUserIDs.length) ? row.ManagerUserIDs.join(', ') : clientLang('word-none')) + '&emsp;';
                if (row.SourceType) {
                    tmp += '<b>' + clientLang('word-source') + '</b>: ' + clientSourceTypeText(row.SourceType) + '&emsp;';
                }
                if (row.SourcePlatformID) {
                    tmp += '<b>' + clientLang('word-platform') + '</b>: ' + row.SourcePlatformID + '&emsp;';
                }
                tmp += '<br/><br/>';
            }
            if (row.Cnf.U || row.Cnf.P) {
                tmp += '<b langtag="word-basicusername"></b>: ' + row.Cnf.U + '&emsp;';
                tmp += '<b langtag="word-basicpassword"></b>: ' + row.Cnf.P + '&emsp;<br/><br/>';
            }
            tmp += '<b langtag="word-crypt"></b>: <span langtag="word-' + row.Cnf.Crypt + '"></span>&emsp;';
            tmp += '<b langtag="word-compress"></b>: <span langtag="word-' + row.Cnf.Compress + '"></span>&emsp;';
            tmp += '<b langtag="word-connectbyconfig"></b>: <span langtag="word-' + row.ConfigConnAllow + '"></span>&emsp;<br/><br/>';
            if (Number(row.EntryAclMode || 0) !== 0) {
                var aclModeTag = Number(row.EntryAclMode || 0) === 1 ? 'word-whitelist' : 'word-blacklist';
                tmp += '<b langtag="word-entryacl"></b>: <span langtag="' + aclModeTag + '"></span>&emsp;';
                tmp += '<b langtag="word-entryaclrules"></b>: ' + escapeHtml(row.EntryAclRules || '') + '&emsp;<br/><br/>';
            }
            tmp += clientCommandSnippet('word-commandclient-tcp', 'tcp', row);
            tmp += clientCommandSnippet('word-commandclient-kcp', 'kcp', row);
            tmp += clientCommandSnippet('word-commandclient-tls', 'tls', row);
            tmp += clientCommandSnippet('word-commandclient-quic', 'quic', row);
            tmp += clientCommandSnippet('word-commandclient-ws', 'ws', row);
            tmp += clientCommandSnippet('word-commandclient-wss', 'wss', row);
            if (canInspectClientConnections()) {
                tmp += '<div id="' + clientConnectionContainerID(row.Id) + '" class="nps-client-runtime-instances"></div>';
            }
            return tmp;
        },
        columns: [
            (canBulkManageClients() ? {
                checkbox: true,
                align: 'center',
                valign: 'middle'
            } : null),
            {
                field: 'Id',
                title: '<span langtag="word-id"></span>',
                halign: 'center',
                visible: true,
                sortable: true,
                formatter: function (value) {
                    return '<span onclick="oCopy(this)">' + value + '</span>';
                }
            },
            {
                field: 'Remark',
                title: '<span langtag="word-remark"></span>',
                halign: 'center',
                visible: true,
                sortable: true,
                formatter: function (value) {
                    return '<span onclick="oCopy(this)">' + value + '</span>';
                }
            },
            (canShowClientOwnerMeta() ? {
                field: 'UserId',
                title: '<span langtag="word-owneruser"></span>',
                halign: 'center',
                visible: true,
                sortable: false,
                formatter: function (value, row) {
                    return clientOwnerDisplay(row);
                }
            } : null),
            {
                field: 'Version',
                title: '<span langtag="word-version"></span>',
                halign: 'center',
                visible: true,
                sortable: true,
                formatter: function (value) {
                    return '<span onclick="oCopy(this)">' + escapeHtml(value) + '</span>';
                }
            },
            {
                field: 'Mode',
                title: '<span langtag="word-scheme"></span>',
                halign: 'center',
                visible: true,
                sortable: true,
                formatter: function (value) {
                    return '<span onclick="oCopy(this)">' + getBridgeMode(value) + '</span>';
                }
            },
            {
                field: 'VerifyKey',
                title: '<span langtag="word-verifykey"></span>',
                halign: 'center',
                visible: true,
                sortable: true,
                formatter: function (value, row) {
                    if (!row.NoStore) {
                        return '<span onclick="oCopy(this)">' + value + '</span>';
                    }
                    return '<span langtag="word-publicvkey"></span>';
                }
            },
            {
                field: 'Addr',
                title: '<span langtag="word-address"></span>',
                halign: 'center',
                visible: false,
                sortable: true,
                formatter: function (value) {
                    return '<span onclick="oCopy(this)">' + value + '</span>';
                }
            },
            {
                field: 'LocalAddr',
                title: '<span langtag="word-localaddress"></span>',
                halign: 'center',
                visible: false,
                sortable: true,
                formatter: function (value) {
                    return '<span onclick="oCopy(this)">' + value + '</span>';
                }
            },
            {
                field: 'InletFlow',
                title: '<span langtag="word-inletflow"></span>',
                halign: 'center',
                visible: false,
                sortable: true,
                formatter: function (value, row) {
                    return clientClearAction(row, 'flow', changeunit(row.Flow.InletFlow));
                }
            },
            {
                field: 'ExportFlow',
                title: '<span langtag="word-exportflow"></span>',
                halign: 'center',
                visible: false,
                sortable: true,
                formatter: function (value, row) {
                    return clientClearAction(row, 'flow', changeunit(row.Flow.ExportFlow));
                }
            },
            {
                field: 'TotalFlow',
                title: '<span langtag="word-totalflow"></span>',
                halign: 'center',
                visible: true,
                sortable: true,
                formatter: function (value, row) {
                    return clientClearAction(row, 'flow', changeunit(clientFlow(row)));
                }
            },
            {
                field: 'FlowRemain',
                title: '<span langtag="word-flowremain"></span>',
                halign: 'center',
                visible: false,
                sortable: true,
                formatter: function (value, row) {
                    return clientClearAction(row, 'flow_limit', formatClientFlowRemain(row), {skipInherited: true});
                }
            },
            {
                field: 'TimeRemain',
                title: '<span langtag="word-timeremain"></span>',
                halign: 'center',
                visible: false,
                sortable: true,
                formatter: function (value, row) {
                    if (clientHasOwnerUser(row)) {
                        return clientLifecycleInheritedText();
                    }
                    if (!row.ExpireAt) {
                        return '<span langtag="word-false"></span>';
                    }
                    return clientClearAction(row, 'time_limit', getRemainingTime(clientExpireAtIso(row)).formatted, {skipInherited: true});
                }
            },
            {
                field: 'FlowLimit',
                title: '<span langtag="word-flowlimit"></span>',
                halign: 'center',
                visible: false,
                sortable: true,
                formatter: function (value, row) {
                    if (clientHasOwnerUser(row)) {
                        return clientLifecycleInheritedText();
                    }
                    if (value === 0) {
                        return '<span langtag="word-false"></span>';
                    }
                    return clientClearAction(row, 'flow_limit', changeunit(value), {skipInherited: true});
                }
            },
            {
                field: 'ExpireAt',
                title: '<span langtag="word-timelimit"></span>',
                halign: 'center',
                visible: false,
                sortable: true,
                formatter: function (value, row) {
                    if (clientHasOwnerUser(row)) {
                        return clientLifecycleInheritedText();
                    }
                    if (value === 0) {
                        return '<span langtag="word-false"></span>';
                    }
                    return clientClearAction(row, 'time_limit', formatClientExpireAtValue(value), {skipInherited: true});
                }
            },
            {
                field: 'NowConn',
                title: '<span langtag="word-nowconn"></span>',
                halign: 'center',
                visible: true,
                sortable: true,
                formatter: function (value) {
                    return '<span onclick="oCopy(this)">' + value + '</span>';
                }
            },
            {
                field: 'Rate.NowRate',
                title: '<span langtag="word-speed"></span>',
                halign: 'center',
                visible: true,
                sortable: true,
                formatter: function (value) {
                    return changeunit(value) + clientPerSecondUnitText();
                }
            },
            {
                field: 'Status',
                title: '<span langtag="word-status"></span>',
                align: 'center',
                halign: 'center',
                visible: true,
                sortable: true,
                formatter: function (value) {
                    if (value) {
                        return '<span class="badge badge-primary" langtag="word-open"></span>';
                    }
                    return '<span class="badge badge-badge" langtag="word-close"></span>';
                }
            },
            {
                field: 'IsConnect',
                title: '<span langtag="word-connect"></span>',
                align: 'center',
                halign: 'center',
                visible: true,
                sortable: true,
                formatter: function (value, row) {
                    if (value) {
                        if (canPingClients()) {
                            return '<span class="badge badge-primary client-online-ping nps-clickable" langtag="word-online" data-id="' + row.Id + '" onclick="pingClient(this,' + row.Id + ')"></span>';
                        }
                        return '<span class="badge badge-primary" langtag="word-online"></span>';
                    }
                    return '<span class="badge badge-badge" langtag="word-offline"></span>';
                }
            },
            {
                field: 'option',
                title: '<span langtag="word-option"></span>',
                align: 'center',
                halign: 'center',
                visible: true,
                formatter: function (value, row) {
                    var btnGroup = '<div class="btn-group">';
                    if (canManageClientStatus()) {
                        if (row.Status) {
                            btnGroup += '<a onclick="window.nps.submitFormAction(\'stop\', window.nps.clientActions.changeStatus(' + row.Id + '), {\'id\':' + row.Id + ', \'status\': 0})" class="btn btn-outline btn-warning"><i class="fa fa-pause"></i></a>';
                        } else {
                            btnGroup += '<a onclick="window.nps.submitFormAction(\'start\', window.nps.clientActions.changeStatus(' + row.Id + '), {\'id\':' + row.Id + ', \'status\': 1})" class="btn btn-outline btn-primary"><i class="fa fa-play"></i></a>';
                        }
                    }
                    if (canDeleteClient()) {
                        if (!window.nps.allowLocalProxy() || row.Id > 0) {
                            btnGroup += '<a onclick="window.nps.submitFormAction(\'delete\', window.nps.clientActions.del(' + row.Id + '), {\'id\':' + row.Id + '})" class="btn btn-outline btn-danger"><i class="fa fa-trash"></i></a>';
                        }
                    }
                    if (canEditClient()) {
                        btnGroup += '<a href="' + window.nps.pagePath('client', 'edit', {id: row.Id}) + '" class="btn btn-outline btn-success"><i class="fa fa-edit"></i></a>';
                    }
                    btnGroup += '</div>';
                    return btnGroup;
                }
            },
            {
                field: 'show',
                title: '<span langtag="word-show"></span>',
                align: 'center',
                halign: 'center',
                visible: true,
                formatter: function (value, row) {
                    var btnGroup = '<div class="btn-group">';
                    if (canViewClientTunnels()) {
                        btnGroup += '<a href="' + window.nps.pagePath('index', 'all', {client_id: row.Id})
                            + '" class="btn btn-outline btn-primary" langtag="word-tunnel"></a>';
                    }
                    if (canViewClientHosts()) {
                        btnGroup += '<a href="' + window.nps.pagePath('index', 'hostlist', {client_id: row.Id})
                            + '" class="btn btn-outline btn-success" langtag="word-host"></a>';
                    }
                    btnGroup += '</div>';
                    return btnGroup;
                }
            }
        ].filter(Boolean)
    });

    function pingClient(el, id) {
        var $el = $(el);
        if (!canPingClients() || $el.data('pinging')) return;
        $el.data('pinging', true)
            .attr('title', clientLang('info-pinging'))
            .text(clientLang('word-loading-short'))
            .addClass('disabled');
        $.ajax({
            url: window.nps.clientActions.ping(id).url,
            type: window.nps.clientActions.ping(id).method,
            dataType: 'json',
            data: { id: id }
        }).done(function (res) {
            if (res && res.code === 1) {
                var pingData = res.data && res.data.item ? res.data.item : (res.data || res);
                var ms = parseInt(pingData.rtt, 10);
                if (isNaN(ms)) ms = pingData.rtt;
                $el.text(clientFormat('info-ping-ms', {value: ms}));
            } else {
                $el.text(clientLang('word-error-short'));
            }
        }).fail(function () {
            $el.text(clientLang('word-error-short'));
        }).always(function () {
            $el.data('pinging', false).removeClass('disabled').removeAttr('title');
        });
    }

    function triggerVisibleClientPing(btn) {
        var $btn = $(btn);
        if (!canPingClients() || $btn.data('pinging')) return;
        $btn.data('pinging', true).addClass('disabled');
        $('#table').find('span.client-online-ping[data-id]').each(function () {
            var id = parseInt($(this).attr('data-id'), 10);
            if (!isNaN(id) && id > 0) {
                pingClient(this, id);
            }
        });
        setTimeout(function () {
            $btn.data('pinging', false).removeClass('disabled');
        }, 600);
    }

    function showQr(el) {
        document.getElementById('qrImg').src = el.getAttribute('data-url');
        $('#qrModal').modal('show');
    }

    function buildSelectedClientBatchItems(ids, action) {
        return ids.map(function (id) {
            switch (action) {
                case 'start':
                case 'stop':
                    return {
                        id: action + '-client-' + id,
                        method: 'POST',
                        path: window.nps.clientActions.changeStatus(id).url,
                        body: {id: id, status: action === 'start' ? 1 : 0}
                    };
                case 'clear':
                    return {
                        id: action + '-client-' + id,
                        method: 'POST',
                        path: window.nps.clientActions.clear(id).url,
                        body: {id: id, mode: 'flow'}
                    };
                case 'delete':
                    var deleteRequest = window.nps.clientActions.del(id);
                    return {
                        id: action + '-client-' + id,
                        method: deleteRequest.method,
                        path: deleteRequest.url,
                        body: {id: id}
                    };
                default:
                    return null;
            }
        }).filter(Boolean);
    }

    function filterSelectedClientIDs(ids, action) {
        if (window.nps.allowLocalProxy() && action === 'delete') {
            return ids.filter(function (id) {
                return parseInt(id, 10) > 0;
            });
        }
        return ids;
    }

    function runSelectedClientBatch(action) {
        return window.nps.runSelectionBatch({
            table: '#table',
            idField: 'Id',
            trigger: '.client-bulk-action',
            action: action,
            confirmAction: action,
            filterIDs: function (ids) {
                return filterSelectedClientIDs(ids, action);
            },
            buildItems: function (ids) {
                return buildSelectedClientBatchItems(ids, action);
            },
            refresh: function () {
                $('#table').bootstrapTable('refresh');
            }
        });
    }

    window.nps.bindTableSelectionActions({
        table: '#table',
        idField: 'Id',
        summary: '#client-bulk-selection-summary',
        buttons: '.client-bulk-action'
    });
    window.nps.syncConditionalVisibility(document.getElementById('toolbar'));
    }

    $(function () {
        window.nps.fetchNodeDisplay().then(function (display) {
            clientPageDisplay = display || {};
            initClientTable();
        }, function () {
            initClientTable();
        });
    });

    function internationalized() {
        if ($('#table').length) {
            $('#table').bootstrapTable('refresh');
        }
    }
</script>
