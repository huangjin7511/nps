<div class="wrapper wrapper-content animated fadeInRight">

    <div class="row">
        <div class="col-lg-12">
            <div class="ibox float-e-margins nps-list-shell">
                <div class="ibox-title">
                    <h5 class="nps-list-title" langtag="page-hostlist"></h5>
                    <p class="nps-list-subtitle" langtag="info-host-list-subtitle"></p>

                    <div class="ibox-tools">
                        <a class="collapse-link">
                            <i class="fa fa-chevron-up"></i>
                        </a>
                        <a class="close-link">
                            <i class="fa fa-times"></i>
                        </a>
                    </div>
                </div>
                <div class="content">
                    <div class="table-responsive">
                        <div id="toolbar">
                            <div class="d-flex w-100 flex-wrap align-items-center">
                                <a class="btn btn-primary mr-2"
                                   id="host-add-link"
                                   href="{{.web_base_url}}/index/addhost"
                                   data-nps-page-controller="index"
                                   data-nps-page-action="addhost"
                                   data-nps-require-page-controller="index"
                                   data-nps-require-page-action="addhost"
                                   data-nps-require-node-action="hosts/add">
                                    <i class="fa fa-fw fa-lg fa-plus"></i>
                                    <span langtag="word-add"></span>
                                </a>
                                <div class="btn-group mr-2 mt-2 mt-md-0"
                                     data-nps-require-any-node-actions="hosts/start,hosts/stop,hosts/delete">
                                    <button type="button" class="btn btn-outline btn-primary host-bulk-action" id="host-bulk-start" onclick="runSelectedHostBatch('start')" disabled>
                                        <i class="fa fa-play"></i>
                                        <span langtag="word-start"></span>
                                    </button>
                                    <button type="button" class="btn btn-outline btn-warning host-bulk-action" id="host-bulk-stop" onclick="runSelectedHostBatch('stop')" disabled>
                                        <i class="fa fa-pause"></i>
                                        <span langtag="word-stop"></span>
                                    </button>
                                    <button type="button"
                                            class="btn btn-outline btn-danger host-bulk-action"
                                            id="host-bulk-delete"
                                            data-nps-require-node-action="hosts/delete"
                                            onclick="runSelectedHostBatch('delete')"
                                            disabled>
                                        <i class="fa fa-trash"></i>
                                        <span langtag="word-delete"></span>
                                    </button>
                                </div>
                                <button type="button"
                                        class="btn btn-outline btn-default mr-2 mt-2 mt-md-0 host-bulk-action"
                                        id="host-bulk-reset"
                                        data-nps-require-any-node-actions="hosts/start,hosts/stop,hosts/delete"
                                        onclick="window.nps.clearTableSelections('#table')"
                                        disabled>
                                    <i class="fa fa-times"></i>
                                    <span langtag="word-cancel"></span>
                                </button>
                                <span class="text-muted small align-self-center mt-2 mt-md-0"
                                      id="host-bulk-selection-summary"
                                      data-nps-require-any-node-actions="hosts/start,hosts/stop,hosts/delete"></span>
                            </div>
                        </div>
                        <table class="table-striped table-hover" data-mobile-responsive="true" id="taskList_table"></table>
                    </div>
                </div>
                <div class="ibox-content">

                    <table id="table"></table>

                </div>
            </div>
        </div>
    </div>
</div>

<script>
    var hostPageDisplay = {};
    var hostPageClientID = window.nps.pageIntParam('client_id');
    var hostPageTaskID = window.nps.pageParam('vkey') || window.nps.pageParam('task_id');

    window.nps.hostActions = {
        list: window.nps.nodeRoute('hosts'),
        clear: function (id) { return window.nps.nodeMutation('host', 'clear', id); },
        start: function (id) { return window.nps.nodeMutation('host', 'start', id); },
        stop: function (id) { return window.nps.nodeMutation('host', 'stop', id); },
        del: function (id) { return window.nps.nodeMutation('host', 'delete', id); }
    };

    function hostHTTPProxyPort() {
        return Number(hostPageDisplay.http_proxy_port || 0);
    }

    function hostHTTPSProxyPort() {
        return Number(hostPageDisplay.https_proxy_port || 0);
    }

    function configureHostPageLinks() {
        var addLink = document.getElementById('host-add-link');
        if (!addLink) {
            return;
        }
        var params = {};
        if (hostPageTaskID) {
            params.vkey = hostPageTaskID;
        }
        if (hostPageClientID > 0) {
            params.client_id = hostPageClientID;
        }
        addLink.href = window.nps.pagePath('index', 'addhost', params);
        addLink.setAttribute('data-nps-page-query', $.param(params));
    }

    function canCreateHost() {
        return window.nps.pageAvailable('index', 'addhost') && window.nps.nodeActionAvailable('hosts/add');
    }

    function canStartHost() {
        return window.nps.nodeActionAvailable('hosts/start');
    }

    function canStopHost() {
        return window.nps.nodeActionAvailable('hosts/stop');
    }

    function canDeleteHost() {
        return window.nps.nodeActionAvailable('hosts/delete');
    }

    function canEditHost() {
        return window.nps.pageAvailable('index', 'edithost') && window.nps.nodeActionAvailable('hosts/edit');
    }

    function canClearHost() {
        return window.nps.nodeActionAvailable('hosts/clear');
    }

    function canBulkManageHosts() {
        return window.nps.anyNodeActionAvailable(['hosts/start', 'hosts/stop', 'hosts/delete']);
    }

    function hostClearAction(row, mode, content) {
        if (!canClearHost()) {
            return content;
        }
        return '<span onclick="submitHostClear(' + row.Id + ', \'' + mode + '\')">' + content + '</span>';
    }

    function submitHostClear(id, mode) {
        window.nps.submitFormAction('clear', window.nps.hostActions.clear(id), {id: id, mode: mode});
    }

    function hostControlAction(action, row, mode, content) {
        var canControl = action === 'start' ? canStartHost() : canStopHost();
        if (!canControl) {
            return content;
        }
        return '<span onclick="submitHostMode(\'' + action + '\', ' + row.Id + ', \'' + mode + '\')">' + content + '</span>';
    }

    function submitHostMode(action, id, mode) {
        var request = action === 'start' ? window.nps.hostActions.start(id) : window.nps.hostActions.stop(id);
        window.nps.submitFormAction(action, request, {id: id, mode: mode});
    }

    function hostMegabyteUnitText() {
        return window.nps.langText('unit-megabyte', '');
    }

    /*bootstrap table*/
    function initHostTable() {
    $('#table').bootstrapTable({
        toolbar: "#toolbar",
        method: 'get', // 服务器数据的请求方式 get or post
        url: window.nps.hostActions.list, // 服务器数据的加载地址
        queryParams: function (params) {
            return window.nps.resourceListQueryParams(params, {
                "client_id": hostPageClientID
            });
        },
        responseHandler: function (response) {
            return window.nps.resourceListResponseHandler(response, window.nps.adaptNodeHostResource);
        },
        search: true,
        striped: true, // 设置为true会有隔行变色效果
        showHeader: true,
        showColumns: true,
        showRefresh: true,
        pagination: true,//分页
        sidePagination: 'server',//服务器端分页
        pageNumber: 1,
        pageList: [5, 10, 20, 50, 100, 'all'],
        cookie: true,
        cookieIdTable: 'host',
        cookieStorage: 'localStorage',
        idField: 'Id',
        uniqueId: 'Id',
        maintainMetaData: true,
        detailView: true,
        smartDisplay: true, // 智能显示 pagination 和 cardview 等
        onExpandRow: function () { $('body').setLang('.detail-view'); },
        onLoadSuccess:function (data) { $('body').setLang('.detail-view'); },
        onPostBody: function (data) { if ($(this)[0].locale != undefined ) $('body').setLang('#table'); },
        detailFormatter: function (index, row, element) {
            tmp = '<b langtag="word-exportflow"></b>: <span onclick="window.nps.submitFormAction(\'clear\', window.nps.hostActions.clear(' + row.Id + '), {\'id\':' + row.Id + ', \'mode\': \'flow\'})">' + changeunit(row.Flow.ExportFlow) + '</span>&emsp;'
                + '<b langtag="word-inletflow"></b>: <span onclick="window.nps.submitFormAction(\'clear\', window.nps.hostActions.clear(' + row.Id + '), {\'id\':' + row.Id + ', \'mode\': \'flow\'})">' + changeunit(row.Flow.InletFlow) + '</span>&emsp;'
                + '<b langtag="word-crypt"></b>: <span langtag="word-' + row.Client.Cnf.Crypt + '"></span>&emsp;'
                + '<b langtag="word-compress"></b>: <span langtag="word-' + row.Client.Cnf.Compress + '"></span>&emsp;'
                + '<b langtag="word-flowlimit"></b>: <span onclick="window.nps.submitFormAction(\'clear\', window.nps.hostActions.clear(' + row.Id + '), {\'id\':' + row.Id + ', \'mode\': \'flow_limit\'})">' + row.Flow.FlowLimit + hostMegabyteUnitText() + '</span>&emsp;'
                + '<b langtag="word-timelimit"></b>: <span onclick="window.nps.submitFormAction(\'clear\', window.nps.hostActions.clear(' + row.Id + '), {\'id\':' + row.Id + ', \'mode\': \'time_limit\'})">' + row.Flow.TimeLimit + '</span>&emsp;<br/><br>'
                + '<b langtag="word-autohttps"></b>: <span onclick="window.nps.submitFormAction(\'turn\', window.nps.hostActions.clear(' + row.Id + '), {\'id\':' + row.Id + ', \'mode\': \'auto_https\'})" langtag="word-' + row.AutoHttps + '"></span>&emsp;'
                + '<b langtag="word-autocors"></b>: <span onclick="window.nps.submitFormAction(\'turn\', window.nps.hostActions.clear(' + row.Id + '), {\'id\':' + row.Id + ', \'mode\': \'auto_cors\'})" langtag="word-' + row.AutoCORS + '"></span>&emsp;'
                + '<b langtag="word-compatmode"></b>: <span onclick="window.nps.submitFormAction(\'turn\', window.nps.hostActions.clear(' + row.Id + '), {\'id\':' + row.Id + ', \'mode\': \'compat_mode\'})" langtag="word-' + row.CompatMode + '"></span>&emsp;'
                + '<b langtag="word-proxyprotocoltitle"></b>: <span langtag="word-proxyprotocolv' + row.Target.ProxyProtocol + '"></span>&emsp;'
                + '<b langtag="word-httpsjustproxytitle"></b>: <span onclick="window.nps.submitFormAction(\'turn\', window.nps.hostActions.clear(' + row.Id + '), {\'id\':' + row.Id + ', \'mode\': \'https_just_proxy\'})" langtag="word-' + row.HttpsJustProxy + '"></span>&emsp;'
                + '<b langtag="word-tlsoffloadtitle"></b>: <span onclick="window.nps.submitFormAction(\'turn\', window.nps.hostActions.clear(' + row.Id + '), {\'id\':' + row.Id + ', \'mode\': \'tls_offload\'})" langtag="word-' + row.TlsOffload + '"></span>&emsp;'
                + '<b langtag="word-targettype"></b>: <span onclick="window.nps.submitFormAction(\'turn\', window.nps.hostActions.clear(' + row.Id + '), {\'id\':' + row.Id + ', \'mode\': \'target_is_https\'})" langtag="word-ishttps' + row.TargetIsHttps + '"></span>&emsp;<br/><br>'
            if (row.Client.Cnf.U || row.Client.Cnf.P) {
                tmp += '<b langtag="word-basicusername"></b>: <span onclick="oCopy(this)">' + row.Client.Cnf.U + '</span>&emsp;'
                + '<b langtag="word-basicpassword"></b>: <span onclick="oCopy(this)">' + row.Client.Cnf.P + '</span>&emsp;<br/><br>'
            }
            if (row.UserAuth && row.UserAuth.Content) {
                tmp += '<b langtag="word-auth"></b>: ' + (row.UserAuth && row.UserAuth.Content ? row.UserAuth.Content : '') + '&emsp;<br/><br>'
            }
            if (row.HostChange) {
                tmp += '<b langtag="word-requesthost"></b>: <span onclick="oCopy(this)">' + row.HostChange + '</span>&emsp;<br/><br>'
            }
            if (row.HeaderChange) {
                tmp += '<b langtag="word-requestheader"></b>: ' + row.HeaderChange + '&emsp;<br/><br>'
            }
            if (row.RespHeaderChange) {
                tmp += '<b langtag="word-responseheader"></b>: ' + row.RespHeaderChange + '&emsp;<br/><br>'
            }
            if (row.RedirectURL) {
                tmp += '<b langtag="word-redirecturl"></b>: <span onclick="oCopy(this)">' + row.RedirectURL + '</span>&emsp;<br/><br>'
            }
            tmp += '<b langtag="word-autossl"></b>: <span onclick="window.nps.submitFormAction(\'turn\', window.nps.hostActions.clear(' + row.Id + '), {\'id\':' + row.Id + ', \'mode\': \'auto_ssl\'})" langtag="word-' + row.AutoSSL + '"></span>&emsp;'
            if (row.Scheme != "http" && row.HttpsJustProxy == false && row.AutoSSL == false && (row.CertFile || row.KeyFile)) {
                return tmp + "<br/><br>"
                + '<b langtag="word-httpscert"></b>: <div onclick="oCopy(this)" class="nps-copy-pane">' + row.CertFile + '</div>&emsp;<br/>'
                + '<b langtag="word-httpskey"></b>: <div onclick="oCopy(this)" class="nps-copy-pane">' + row.KeyFile + '</div>&emsp;<br/><br>'
            }
            return tmp
        },
        // 表格的列
        columns: [
            (canBulkManageHosts() ? {
                checkbox: true,
                align: 'center',
                valign: 'middle'
            } : null),
            {
                field: 'Id', //域值
                title: '<span langtag="word-id"></span>', //标题
                halign: 'center',
                visible: true, //false表示不显示
                sortable: true,//启用排序
                formatter: function (value, row, index) {
                    return '<span onclick="oCopy(this)">' + value + '</span>'
                }
            },
            {
                field: 'Client.Id', //域值
                title: '<span langtag="word-clientid"></span>', //标题
                halign: 'center',
                visible: true, //false表示不显示
                sortable: true,//启用排序
                formatter: function (value, row, index) {
                    var text = row.Client.Remark ? (row.Client.Id + ' · ' + row.Client.Remark) : row.Client.Id
                    return '<span onclick="copyText(\'' + row.Client.VerifyKey + '\')">' + text + '</span>'
                }
            },
            {
                field: 'Remark', //域值
                title: '<span langtag="word-remark"></span>', //标题
                halign: 'center',
                visible: true, //false表示不显示
                sortable: true,//启用排序
                formatter: function (value, row, index) {
                    return '<span onclick="oCopy(this)">' + value + '</span>'
                }
            },
            {
                field: 'Client.VerifyKey', //域值
                title: '<span langtag="word-verifykey"></span>', //标题
                halign: 'center',
                visible: false, //false表示不显示
                sortable: true,//启用排序
                formatter: function (value, row, index) {
                    return '<span onclick="oCopy(this)">' + value + '</span>'
                }
            },
            {
                field: 'Host', //域值
                title: '<span langtag="word-host"></span>', //标题
                halign: 'center',
                visible: true, //false表示不显示
                sortable: true,//启用排序
                formatter: function (value, row, index) {
                    hosturl = ((row.Scheme == 'http') ? 'http://' : 'https://') + row.Host + ((row.Scheme == 'http') ? ":" + hostHTTPProxyPort() : ":" + hostHTTPSProxyPort()) + row.Location
                    return '<a href="' + hosturl + '" target="_blank">' + row.Host + '</a>'
                }
            },
            {
                field: 'Scheme', //域值
                title: '<span langtag="word-scheme"></span>', //标题
                halign: 'center',
                visible: true, //false表示不显示
                sortable: true,//启用排序
                formatter: function (value, row, index) {
                    return '<span langtag="word-' + value + '"></span>'
                }
            },
            {
                field: 'TargetIsHttps', //域值
                title: '<span langtag="word-targettype"></span>', //标题
                halign: 'center',
                visible: false, //false表示不显示
                sortable: true, //启用排序
                formatter: function (value, row, index) {
                    if (value) {
                        return hostControlAction('stop', row, 'target_is_https', '<span langtag="word-ishttps' + value + '"></span>');
                    }
                    return hostControlAction('start', row, 'target_is_https', '<span langtag="word-ishttps' + value + '"></span>');
                }
            },
            {
                field: 'Target.TargetStr', //域值
                title: '<span langtag="word-target"></span>', //标题
                halign: 'center',
                visible: true, //false表示不显示
                sortable: true,//启用排序
                formatter: function (value, row, index) {
                    return '<span onclick="oCopy(this)">' + value + '</span>'
                }
            },
            {
                field: 'Location', //域值
                title: '<span langtag="word-path"></span>', //标题
                halign: 'center',
                visible: true, //false表示不显示
                sortable: true,//启用排序
                formatter: function (value, row, index) {
                    return '<span onclick="oCopy(this)">' + value + '</span>'
                }
            },
            {
                field: 'PathRewrite', //域值
                title: '<span langtag="word-pathrewrite"></span>', //标题
                halign: 'center',
                visible: false, //false表示不显示
                sortable: true, //启用排序
                formatter: function (value, row, index) {
                    return '<span onclick="oCopy(this)">' + value + '</span>'
                }
            },
            {
                field: 'HttpsJustProxy', //域值
                title: '<span langtag="word-httpsjustproxytitle"></span>', //标题
                halign: 'center',
                visible: false, //false表示不显示
                sortable: true, //启用排序
                formatter: function (value, row, index) {
                    if (value) {
                        return hostControlAction('stop', row, 'https_just_proxy', '<span langtag="word-' + value + '"></span>');
                    }
                    return hostControlAction('start', row, 'https_just_proxy', '<span langtag="word-' + value + '"></span>');
                }
            },
            {
                field: 'TlsOffload', //域值
                title: '<span langtag="word-tlsoffloadtitle"></span>', //标题
                halign: 'center',
                visible: false, //false表示不显示
                sortable: true, //启用排序
                formatter: function (value, row, index) {
                    if (value) {
                        return hostControlAction('stop', row, 'tls_offload', '<span langtag="word-' + value + '"></span>');
                    }
                    return hostControlAction('start', row, 'tls_offload', '<span langtag="word-' + value + '"></span>');
                }
            },
            {
                field: 'AutoSSL', //域值
                title: '<span langtag="word-autossl"></span>', //标题
                halign: 'center',
                visible: false, //false表示不显示
                sortable: true, //启用排序
                formatter: function (value, row, index) {
                    if (value) {
                        return hostControlAction('stop', row, 'auto_ssl', '<span langtag="word-' + value + '"></span>');
                    }
                    return hostControlAction('start', row, 'auto_ssl', '<span langtag="word-' + value + '"></span>');
                }
            },
            {
                field: 'AutoHttps', //域值
                title: '<span langtag="word-autohttpstitle"></span>', //标题
                halign: 'center',
                visible: false, //false表示不显示
                sortable: true, //启用排序
                formatter: function (value, row, index) {
                    if (value) {
                        return hostControlAction('stop', row, 'auto_https', '<span langtag="word-' + value + '"></span>');
                    }
                    return hostControlAction('start', row, 'auto_https', '<span langtag="word-' + value + '"></span>');
                }
            },
            {
                field: 'AutoCORS', //域值
                title: '<span langtag="word-autocorstitle"></span>', //标题
                halign: 'center',
                visible: false, //false表示不显示
                sortable: true, //启用排序
                formatter: function (value, row, index) {
                    if (value) {
                        return hostControlAction('stop', row, 'auto_cors', '<span langtag="word-' + value + '"></span>');
                    }
                    return hostControlAction('start', row, 'auto_cors', '<span langtag="word-' + value + '"></span>');
                }
            },
            {
                field: 'CompatMode', //域值
                title: '<span langtag="word-compatmode"></span>', //标题
                halign: 'center',
                visible: false, //false表示不显示
                sortable: true, //启用排序
                formatter: function (value, row, index) {
                    if (value) {
                        return hostControlAction('stop', row, 'compat_mode', '<span langtag="word-' + value + '"></span>');
                    }
                    return hostControlAction('start', row, 'compat_mode', '<span langtag="word-' + value + '"></span>');
                }
            },
            {
                field: 'InletFlow', //域值
                title: '<span langtag="word-inletflow"></span>', //内容
                align: 'center',
                halign: 'center',
                visible: false, //false表示不显示
                sortable: true, //启用排序
                formatter: function (value, row, index) {
                    return hostClearAction(row, 'flow', changeunit(row.Flow.InletFlow));
                }
            },
            {
                field: 'ExportFlow', //域值
                title: '<span langtag="word-exportflow"></span>', //内容
                align: 'center',
                halign: 'center',
                visible: false, //false表示不显示
                sortable: true, //启用排序
                formatter: function (value, row, index) {
                    return hostClearAction(row, 'flow', changeunit(row.Flow.ExportFlow));
                }
            },
            {
                field: 'TotalFlow', //域值
                title: '<span langtag="word-totalflow"></span>', //内容
                align: 'center',
                halign: 'center',
                visible: true, //false表示不显示
                sortable: true,//启用排序
                formatter: function (value, row, index) {
                    return hostClearAction(row, 'flow', changeunit(row.Flow.InletFlow + row.Flow.ExportFlow));
                }
            },
            {
                field: 'FlowRemain', //域值
                title: '<span langtag="word-flowremain"></span>', //内容
                align: 'center',
                halign: 'center',
                visible: false, //false表示不显示
                sortable: true, //启用排序
                formatter: function (value, row, index) {
                    if (row.Flow.FlowLimit === 0) {
                        return '∞'
                    }
                    return hostClearAction(row, 'flow_limit', changeunit(row.Flow.FlowLimit*1024*1024 - row.Flow.InletFlow - row.Flow.ExportFlow));
                }
            },
            {
                field: 'TimeRemain', //域值
                title: '<span langtag="word-timeremain"></span>', //内容
                align: 'center',
                halign: 'center',
                visible: false, //false表示不显示
                sortable: true, //启用排序
                formatter: function (value, row, index) {
                    return hostClearAction(row, 'time_limit', getRemainingTime(row.Flow.TimeLimit).formatted);
                }
            },
            {
                field: 'Flow.FlowLimit', //域值
                title: '<span langtag="word-flowlimit"></span>', //内容
                align: 'center',
                halign: 'center',
                visible: false, //false表示不显示
                sortable: true, //启用排序
                formatter: function (value, row, index) {
                    if (value === 0) {
                        return '<span langtag="word-false"></span>'
                    }
                    return hostClearAction(row, 'flow_limit', changeunit(value * 1024 * 1024));
                }
            },
            {
                field: 'Flow.TimeLimit', //域值
                title: '<span langtag="word-timelimit"></span>', //内容
                align: 'center',
                halign: 'center',
                visible: false, //false表示不显示
                sortable: true, //启用排序
                formatter: function (value, row, index) {
                    if (value === "0001-01-01T00:00:00Z") {
                        return '<span langtag="word-false"></span>'
                    }
                    return hostClearAction(row, 'time_limit', value);
                }
            },
            {
                field: 'NowConn', //域值
                title: '<span langtag="word-nowconn"></span>', //内容
                align: 'center',
                halign: 'center',
                visible: true, //false表示不显示
                sortable: true,//启用排序
                formatter: function (value, row, index) {
                    return '<span onclick="oCopy(this)">' + value + '</span>'
                }
            },
            {
                field: 'IsClose', //域值
                title: '<span langtag="word-runstatus"></span>', //内容
                align: 'center',
                halign: 'center',
                visible: true, //false表示不显示
                sortable: true,//启用排序
                formatter: function (value, row, index) {
                    if (value) {
                        return '<span class="badge badge-badge" langtag="word-close"></span>'
                    } else {
                        return '<span class="badge badge-primary" langtag="word-open"></span>'
                    }
                }
            },
            {
                field: 'Client.IsConnect', //域值
                title: '<span langtag="word-clientstatus"></span>', //内容
                align: 'center',
                halign: 'center',
                visible: true, //false表示不显示
                sortable: true,//启用排序
                formatter: function (value, row, index) {
                    hosturl = ((row.Scheme == 'http') ? 'http://' : 'https://') + row.Host + row.Location
                    if (value) {
                        return '<a href="' + hosturl + '" target="_blank"><span class="badge badge-primary" langtag="word-online"></span></a>'
                    } else {
                        return '<span class="badge badge-badge" langtag="word-offline"></span>'
                    }
                }
            },
            {
                field: 'option', //域值
                title: '<span langtag="word-option"></span>', //内容
                align: 'center',
                halign: 'center',
                visible: true, //false表示不显示
                formatter: function (value, row, index) {
                    var btnGroup = '<div class="btn-group">';
                    if (row.IsClose) {
                        if (canStartHost()) {
                            btnGroup += '<a onclick="window.nps.submitFormAction(\'start\', window.nps.hostActions.start(' + row.Id + '), {\'id\':' + row.Id + '})" class="btn btn-outline btn-primary"><i class="fa fa-play"></i></a>';
                        }
                    } else if (canStopHost()) {
                        btnGroup += '<a onclick="window.nps.submitFormAction(\'stop\', window.nps.hostActions.stop(' + row.Id + '), {\'id\':' + row.Id + '})" class="btn btn-outline btn-warning"><i class="fa fa-pause"></i></a>';
                    }
                    if (canDeleteHost()) {
                        btnGroup += '<a onclick="window.nps.submitFormAction(\'delete\', window.nps.hostActions.del(' + row.Id + '), {\'id\':' + row.Id + '})" class="btn btn-outline btn-danger"><i class="fa fa-trash"></i></a>';
                    }
                    if (canEditHost()) {
                        btnGroup += '<a href="' + window.nps.pagePath('index', 'edithost', {id: row.Id})
                        + '" class="btn btn-outline btn-success"><i class="fa fa-edit"></i></a>';
                    }
                    btnGroup += '</div>';
                    return btnGroup;
                }
            }
        ]
    });

    function buildSelectedHostBatchItems(ids, action) {
        return ids.map(function (id) {
            switch (action) {
                case 'start':
                    return {
                        id: action + '-host-' + id,
                        method: 'POST',
                        path: window.nps.hostActions.start(id).url,
                        body: {id: id}
                    };
                case 'stop':
                    return {
                        id: action + '-host-' + id,
                        method: 'POST',
                        path: window.nps.hostActions.stop(id).url,
                        body: {id: id}
                    };
                case 'delete':
                    var deleteRequest = window.nps.hostActions.del(id);
                    return {
                        id: action + '-host-' + id,
                        method: deleteRequest.method,
                        path: deleteRequest.url,
                        body: {id: id}
                    };
                default:
                    return null;
            }
        }).filter(Boolean);
    }

    function runSelectedHostBatch(action) {
        return window.nps.runSelectionBatch({
            table: '#table',
            idField: 'Id',
            trigger: '.host-bulk-action',
            action: action,
            confirmAction: action,
            buildItems: function (ids) {
                return buildSelectedHostBatchItems(ids, action);
            },
            refresh: function () {
                $('#table').bootstrapTable('refresh');
            }
        });
    }

    window.nps.bindTableSelectionActions({
        table: '#table',
        idField: 'Id',
        summary: '#host-bulk-selection-summary',
        buttons: '.host-bulk-action'
    });
    window.nps.syncConditionalVisibility(document.getElementById('toolbar'));
    }

    $(function () {
        configureHostPageLinks();
        window.nps.fetchNodeDisplay().then(function (display) {
            hostPageDisplay = display || {};
            initHostTable();
        }, function () {
            initHostTable();
        });
    });
</script>
