<div class="row tile">
    <div class="col-md-12 col-md-auto">
        <div class="ibox float-e-margins nps-form-shell">
            <div class="ibox-title">
                <h3 class="nps-form-title" langtag="page-useradd"></h3>
                <p class="nps-form-subtitle" langtag="info-user-add-subtitle"></p>
            </div>
            <div class="ibox-content">
                <form class="form-horizontal">
                    <div class="form-group">
                        <label class="control-label font-bold" langtag="word-username"></label>
                        <div class="col-sm-12">
                            <input class="form-control" langtag="info-user-username-placeholder" name="username" placeholder="" type="text">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="control-label font-bold" langtag="word-password"></label>
                        <div class="col-sm-12">
                            <input class="form-control" langtag="info-user-password-placeholder" name="password" placeholder="" type="text">
                            <span class="help-block m-b-none" langtag="info-user-password-help"></span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="control-label font-bold" langtag="word-totp"></label>
                        <div class="col-sm-12">
                            <input class="form-control" langtag="info-user-totp-placeholder" name="totp_secret" placeholder="" type="text">
                            <span class="help-block m-b-none" langtag="info-user-totp-help"></span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="control-label font-bold" langtag="word-status"></label>
                        <div class="col-sm-12">
                            <select class="form-control selectpicker" name="status">
                                <option langtag="word-active" value="true"></option>
                                <option langtag="word-disabled" value="false"></option>
                            </select>
                            <span class="help-block m-b-none" langtag="info-user-status-help"></span>
                        </div>
                    </div>
                    <div class="form-group" id="entry_acl_mode">
                        <label class="control-label font-bold" langtag="word-entryacl"></label>
                        <div class="col-sm-12">
                            <select class="form-control selectpicker" name="entry_acl_mode">
                                <option langtag="word-disable" value="0"></option>
                                <option langtag="word-whitelist" value="1"></option>
                                <option langtag="word-blacklist" value="2"></option>
                            </select>
                            <span class="help-block m-b-none" langtag="info-entryacl"></span>
                        </div>
                    </div>
                    <div class="form-group" id="entry_acl_rules">
                        <label class="control-label font-bold" langtag="word-entryaclrules"></label>
                        <div class="col-sm-12">
                            <textarea class="form-control" name="entry_acl_rules" rows="4"></textarea>
                            <span class="help-block m-b-none" langtag="info-entryaclrules"></span>
                        </div>
                    </div>
                    <div class="form-group" id="dest_acl_mode">
                        <label class="control-label font-bold" langtag="word-destacl"></label>
                        <div class="col-sm-12">
                            <select class="form-control selectpicker" name="dest_acl_mode">
                                <option langtag="word-disable" value="0"></option>
                                <option langtag="word-whitelist" value="1"></option>
                                <option langtag="word-blacklist" value="2"></option>
                            </select>
                            <span class="help-block m-b-none" langtag="info-destacl"></span>
                        </div>
                    </div>
                    <div class="form-group" id="dest_acl_rules">
                        <label class="control-label font-bold" langtag="word-destaclrules"></label>
                        <div class="col-sm-12">
                            <textarea class="form-control" name="dest_acl_rules" rows="4"></textarea>
                            <span class="help-block m-b-none" langtag="info-destaclrules"></span>
                        </div>
                    </div>
                    <div class="hr-line-dashed"></div>
                    <div class="form-group">
                        <label class="control-label font-bold" langtag="word-expireat"></label>
                        <div class="col-sm-12">
                            <input class="form-control" langtag="info-datetime-or-unix-placeholder" name="expire_at" placeholder="" type="text">
                            <span class="help-block m-b-none" langtag="info-leave-empty-permanent"></span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="control-label font-bold" langtag="word-flowlimit"></label>
                        <div class="col-sm-12">
                            <input class="form-control" langtag="info-bytes-unlimited-placeholder" name="flow_limit" placeholder="" type="text">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="control-label font-bold" langtag="word-ratelimit"></label>
                        <div class="col-sm-12">
                            <input class="form-control" langtag="info-rate-kbs-unlimited-placeholder" name="rate_limit" placeholder="" type="text">
                        </div>
                    </div>
                    <div class="hr-line-dashed"></div>
                    <div class="form-group">
                        <label class="control-label font-bold" langtag="word-maxclients"></label>
                        <div class="col-sm-12">
                            <input class="form-control" langtag="info-count-unlimited-placeholder" name="max_clients" placeholder="" type="text">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="control-label font-bold" langtag="word-maxtunnels"></label>
                        <div class="col-sm-12">
                            <input class="form-control" langtag="info-count-unlimited-placeholder" name="max_tunnels" placeholder="" type="text">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="control-label font-bold" langtag="word-maxhosts"></label>
                        <div class="col-sm-12">
                            <input class="form-control" langtag="info-count-unlimited-placeholder" name="max_hosts" placeholder="" type="text">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="control-label font-bold" langtag="word-maxconnections"></label>
                        <div class="col-sm-12">
                            <input class="form-control" langtag="info-count-unlimited-placeholder" name="max_connections" placeholder="" type="text">
                        </div>
                    </div>
                    <div class="hr-line-dashed"></div>
                    <div class="form-group nps-form-actions">
                        <div class="col-lg-12">
                            <button class="btn btn-secondary" onclick="window.history.back()" type="button">
                                <i class="fa fa-fw fa-lg fa-window-close"></i> <span langtag="word-cancel"></span>
                            </button>
                            <button class="btn btn-success"
                                    data-nps-require-node-action="users/add"
                                    onclick="submitUserAdd()"
                                    type="button">
                                <i class="fa fa-fw fa-lg fa-check-circle"></i> <span langtag="word-add"></span>
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function canAddUserForm() {
        return window.nps.nodeActionAvailable('users/add');
    }

    function applyUserAddReadOnlyState() {
        if (!canAddUserForm()) {
            window.nps.applyReadOnlyForm('form.form-horizontal', {
                message: window.nps.langText('info-readonly-user-profile', '')
            });
        }
    }

    function submitUserAdd() {
        if (!canAddUserForm()) {
            return;
        }
        window.nps.submitFormAction('add', window.nps.nodeMutation('user', 'add'), $('form').serializeArray());
    }

    $(function () {
        function toggleEntryAclRules() {
            var modeVal = $("select[name='entry_acl_mode']").val();
            var mode = parseInt(modeVal ? modeVal : "0", 10);
            $("#entry_acl_rules").css("display", mode === 0 ? "none" : "block");
        }

        function toggleDestAclRules() {
            var modeVal = $("select[name='dest_acl_mode']").val();
            var mode = parseInt(modeVal ? modeVal : "0", 10);
            $("#dest_acl_rules").css("display", mode === 0 ? "none" : "block");
        }

        $("select[name='entry_acl_mode']").on("change", toggleEntryAclRules);
        $("select[name='dest_acl_mode']").on("change", toggleDestAclRules);
        toggleEntryAclRules();
        toggleDestAclRules();
        window.nps.syncConditionalVisibility(document.querySelector('.nps-form-actions'));
        applyUserAddReadOnlyState();
    });

    function internationalized() {
        applyUserAddReadOnlyState();
    }
</script>
